<!-- Nan seksyon gallery, chak img gen data-category -->
<img src="https://i.postimg.cc/VJctgn1h/VJctgn1h.jpg" alt="Traiteur 1" data-category="Traiteur" onclick="openModal(this)">
<img src="https://i.postimg.cc/7G1dCgHC/7G1dCgHC.jpg" alt="Décoration 2" data-category="Décoration" onclick="openModal(this)">
<img src="https://i.postimg.cc/z32w5yNP/z32w5yNP.jpg" alt="Gâteau 1" data-category="Gâteaux" onclick="openModal(this)">
<img src="https://i.postimg.cc/qzRLC94G/qzRLC94G.jpg" alt="Autre 1" data-category="Autre" onclick="openModal(this)">
<!-- Repete pou tout 40 foto -->

<!-- Modal Content -->
<div id="modal">
  <div id="modal-content">
    <span id="closeModal" onclick="closeModal()">×</span>
    <div style="font-weight:bold; margin-bottom:5px;" id="modal-category"></div> <!-- etikèt kategori -->
    <img id="modal-img" src="">
    <br>
    <button id="whatsappBtn">Voye sou WhatsApp</button>
  </div>
</div>

<script>
let currentLang='fr';
let currentImg='';
let currentCategory='';

function setLanguage(lang){
  currentLang=lang;
  if(lang==='fr'){ document.getElementById("title").innerText="Nos Réalisations"; document.getElementById("homeBtn").innerText="Retour à l'accueil";}
  if(lang==='en'){ document.getElementById("title").innerText="Our Gallery"; document.getElementById("homeBtn").innerText="Back to Home";}
  if(lang==='ht'){ document.getElementById("title").innerText="Galeri Nou"; document.getElementById("homeBtn").innerText="Tounen nan Akèy";}
}

function openModal(img){
  currentImg=img.src;
  currentCategory=img.getAttribute('data-category');
  const modal=document.getElementById('modal');
  document.getElementById('modal-img').src=currentImg;
  document.getElementById('modal-category').innerText=currentCategory; // Montre kategori
  modal.style.display='flex';
  setTimeout(()=>{ modal.classList.add('show'); },10);
}

function closeModal(){ 
  const modal=document.getElementById('modal');
  modal.classList.remove('show');
  setTimeout(()=>{ modal.style.display='none'; },300);
}

document.getElementById('whatsappBtn').addEventListener('click',()=>{
  let msg='';
  if(currentLang==='fr'){ msg=`Bonjour, je souhaite choisir une salle avec cette photo (${currentCategory}) ${currentImg}`;}
  if(currentLang==='en'){ msg=`Hello, I want to choose a room with this photo (${currentCategory}) ${currentImg}`;}
  if(currentLang==='ht'){ msg=`Bonjou, mwen vle chwazi yon sal (${currentCategory}) ak foto sa a ${currentImg}`;}
  msg=encodeURIComponent(msg);
  window.open(`https://wa.me/50942017744?text=${msg}`,'_blank');
});
</script>
