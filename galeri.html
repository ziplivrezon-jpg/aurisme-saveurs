<!DOCTYPE html>
<html lang="fr">

<meta charset="UTF-8">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
/* STYLE JENERAL */
body {margin:0; font-family: 'Segoe UI', Arial, sans-serif; background:#f4f4f4; color: #333; overflow-x: hidden;}
header {background:#800000; color:white; padding:10px; display:flex; align-items:center; border-bottom: 4px solid #DAA520; position: sticky; top: 0; z-index: 1000;}
header img {height:50px; width:50px; border-radius: 50%; background: white; object-fit: cover; border: 2px solid #DAA520;}
header h1 {margin-left:15px; font-size:18px; color:white; text-transform: uppercase;}

/* LOADING SPINNER */
#loader-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; justify-content: center; align-items: center; z-index: 40000; transition: opacity 0.5s ease; }
.spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #800000; border-right: 4px solid #DAA520; border-radius: 50%; animation: spin 1s linear infinite; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
.fade-out { opacity: 0; pointer-events: none; }

/* POP-UP PROMO */
#promo-popup { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 50000; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.4s ease; }
#promo-popup.show { display: flex; opacity: 1; }
.popup-content { background: white; width: 85%; max-width: 350px; padding: 25px; border-radius: 20px; text-align: center; position: relative; border: 3px solid #DAA520; }
.popup-content h2 { color: #800000; margin: 10px 0; font-size: 20px; }
.popup-content p { font-size: 14px; margin-bottom: 20px; color: #444; }
.btn-popup-wa { display: block; background: #25D366; color: white; text-decoration: none; padding: 12px; border-radius: 10px; font-weight: bold; }
.close-popup { position: absolute; top: -15px; right: -15px; background: #800000; color: white; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; border: 2px solid white; }

/* LANG & NAVIGATION */
.nav-section { text-align:center; padding: 10px; background: white; border-bottom: 1px solid #ddd; }
.lang-buttons button {padding:8px 12px; margin:2px; border:1px solid #DAA520; cursor:pointer; background:white; color:#800000; border-radius:20px; font-weight: bold; font-size: 11px;}
.lang-buttons button.active { background:#DAA520; color:white; }
.back-btn {display:inline-block; width:160px; margin:10px auto; text-align:center; padding:8px; background:#800000; color:white; text-decoration:none; border-radius:20px; font-weight: bold; font-size: 12px;}

/* OFFRES STYLE TOURIST (AURIME EXPRESS) */
.offers-section { padding: 15px 10px; }
.offers-grid { display: flex; overflow-x: auto; gap: 12px; padding-bottom: 10px; scrollbar-width: none; scroll-snap-type: x mandatory; }
.offers-grid::-webkit-scrollbar { display: none; }
.offer-card { min-width: 250px; background: linear-gradient(135deg, #800000, #4a0000); color: white; padding: 15px; border-radius: 15px; border: 2px solid #DAA520; scroll-snap-align: start; position: relative; }
.offer-card h4 { margin: 0; font-size: 15px; color: #DAA520; }
.offer-card p { font-size: 11px; margin: 5px 0 10px; }
.btn-get-offer { background: white; color: #800000; border: none; padding: 5px 12px; border-radius: 12px; font-weight: bold; font-size: 10px; cursor: pointer; }

/* SEARCH & FILTER */
.search-container { padding: 0 15px 10px; text-align: center; }
.search-input { width: 100%; max-width: 350px; padding: 12px; border: 2px solid #DAA520; border-radius: 25px; outline: none; }
.filter-container { display: flex; justify-content: center; flex-wrap: wrap; gap: 5px; margin-bottom: 15px; }
.filter-btn { background: white; border: 1px solid #ddd; padding: 6px 12px; border-radius: 20px; font-size: 11px; cursor: pointer; }
.filter-btn.active { background: #800000; color: white; border-color: #800000; }

/* GALERI GRID */
.gallery { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; padding: 8px; margin-bottom: 80px; }
.gallery img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 10px; cursor: pointer; border: 1px solid #eee; }

/* MODAL */
#modal {display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); justify-content:center; align-items:center; z-index:20000; opacity:0; transition:opacity 0.3s;}
#modal.show {display:flex; opacity:1;}
#modal-content {position:relative; background:white; padding:15px; border-radius:15px; max-width:90%; text-align:center;}
#modal-content img {max-width:100%; max-height:50vh; border-radius:10px;}
#whatsappBtn {margin-top:15px; padding:12px; background:#25D366; color:white; border:none; border-radius:10px; cursor:pointer; font-weight: bold; width: 100%;}
.wa-catalog-float { position: fixed; width: 55px; height: 55px; bottom: 20px; right: 20px; background: #25D366; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; z-index: 999; box-shadow: 0 4px 10px rgba(0,0,0,0.3); text-decoration: none; animation: pulse 2s infinite; }
@keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
</style>
</head>

<script>
let currentLang = 'fr';
let currentImg = '';
let currentCategory = '';

const trans = {
    fr: { title: "Nos Réalisations", home: "Accueil", btn: "Commander", search: "Rechercher...", offres: "Offres Spéciales", popH: "OFFRE SPÉCIALE!", popP: "Achetez un gâteau de 5000 HTG et recevez 6 cupcakes gratuits!", popB: "PROFITER", p1: "Promo Gâteau: 6 cupcakes offerts!", p2: "Aurisme Express: -10% livraison" },
    en: { title: "Our Gallery", home: "Home", btn: "Order Now", search: "Search...", offres: "Special Offers", popH: "SPECIAL OFFER!", popP: "Buy a 5000 HTG cake and get 6 free cupcakes!", popB: "GET DEAL", p1: "Cake Promo: 6 free cupcakes!", p2: "Aurisme Express: 10% off" },
    ht: { title: "Galeri Nou", home: "Akèy", btn: "Mwen vle sa", search: "Chèche yon modèl...", offres: "Offres Spéciales", popH: "OFRIS ESPESYAL!", popP: "Achte yon gato 5000 HTG epi resevwa 6 cupcakes gratis!", popB: "PWOFITE", p1: "Promo Gato: 6 cupcakes gratis!", p2: "Aurisme Express: 10% rabè" }
};

function setLanguage(lang) {
    currentLang = lang;
    document.querySelectorAll('.lang-buttons button').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-' + lang).classList.add('active');
    document.getElementById("title").innerText = trans[lang].title;
    document.getElementById("homeBtn").innerText = trans[lang].home;
    document.getElementById("btnTxt").innerText = trans[lang].btn;
    document.getElementById("searchInput").placeholder = trans[lang].search;
    document.getElementById("offresTitle").innerHTML = `<i class="fas fa-tag"></i> ${trans[lang].offres}`;
    document.getElementById("popTitle").innerText = trans[lang].popH;
    document.getElementById("popDesc").innerText = trans[lang].popP;
    document.getElementById("popBtn").innerText = trans[lang].popB;

    document.getElementById('offers-list').innerHTML = `
        <div class="offer-card"><h4>${trans[lang].p1}</h4><p>Pwofite jodi a!</p><button class="btn-get-offer" onclick="window.open('https://wa.me/50942017744?text=Promo Gato')">${trans[lang].popB}</button></div>
        <div class="offer-card" style="background:linear-gradient(135deg, #003366, #001a33);"><h4>${trans[lang].p2}</h4><p>Livrezon rapid nan Pétion-Ville.</p><button class="btn-get-offer" onclick="window.open('https://wa.me/50942017744?text=Promo Livrezon')">${trans[lang].popB}</button></div>
    `;
    localStorage.setItem('lang_gal', lang);
}

function filterGallery(category, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.gallery img').forEach(img => {
        const imgCat = img.getAttribute('data-category');
        img.style.display = (category === 'All' || imgCat === category) ? 'block' : 'none';
    });
}

// SEARCH BAR FIX: Kounye a li chèche nan kategori foto yo byen rapid
function searchGallery() {
    let input = document.getElementById('searchInput').value.toLowerCase();
    let images = document.querySelectorAll('.gallery img');
    let hasResult = false;

    images.forEach(img => {
        let cat = img.getAttribute('data-category').toLowerCase();
        if (cat.includes(input)) {
            img.style.display = 'block';
            hasResult = true;
        } else {
            img.style.display = 'none';
        }
    });
    
    // Si w ap tape, nou mete bouton "Tout" la aktif si w efase tout tèks la
    if(input === "") {
        document.getElementById('btn-all').click();
    }
}

function showPopup() {
    if (!sessionStorage.getItem('popupShown')) {
        setTimeout(() => {
            const p = document.getElementById('promo-popup');
            p.style.display = 'flex';
            setTimeout(() => p.classList.add('show'), 10);
            sessionStorage.setItem('popupShown', 'true');
        }, 1500);
    }
}
function closePopup() {
    const p = document.getElementById('promo-popup');
    p.classList.remove('show');
    setTimeout(() => p.style.display = 'none', 400);
}

function openModal(img) {
    currentImg = img.src; currentCategory = img.getAttribute('data-category');
    document.getElementById('modal-img').src = currentImg;
    document.getElementById('modal-category').innerText = currentCategory;
    const m = document.getElementById('modal');
    m.style.display = 'flex'; setTimeout(() => m.classList.add('show'), 10);
}
function closeModal() {
    const m = document.getElementById('modal');
    m.classList.remove('show'); setTimeout(() => m.style.display = 'none', 300);
}

document.getElementById('whatsappBtn').addEventListener('click', () => {
    window.open(`https://wa.me/50942017744?text=${encodeURIComponent('Bonjou Aurisme, mwen vle kòmande modèl ' + currentCategory + ' sa a : ' + currentImg)}`, '_blank');
});

window.onload = () => {
    setLanguage(localStorage.getItem('lang_gal') || 'fr');
    showPopup();
    setTimeout(() => { document.getElementById("loader-container").classList.add("fade-out"); }, 600);
};
</script>
