<style>
body {margin:0; font-family: Arial,sans-serif; background:#f9f9f9;}
header {background:#800000; color:white; padding:10px; display:flex; align-items:center;}
header img {height:60px; width:auto;}
header h1 {margin-left:15px; font-size:24px; color:white;}
.lang-buttons {text-align:center; margin:10px;}
.lang-buttons button {padding:8px 12px;margin:5px;border:none;cursor:pointer;background:#DAA520;color:white;border-radius:5px;}
.back-btn {display:block;width:150px;margin:15px auto;text-align:center;padding:10px;background:#800000;color:white;text-decoration:none;border-radius:5px;}
#promoBanner {background:#DAA520; color:white; text-align:center; padding:8px; font-weight:bold; font-size:16px;}

/* Grid responsive */
.gallery {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  padding: 10px;
}

.gallery img {
  width: 100%;
  border-radius: 8px;
  cursor: pointer;
  transition: transform 0.3s;
}

.gallery img:hover {
  transform: scale(1.05);
}

/* Modal */
#modal {display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); justify-content:center; align-items:center; z-index:1000; opacity:0; transition:opacity 0.3s;}
#modal.show {display:flex; opacity:1;}
#modal-content {position:relative; background:white; padding:15px; border-radius:8px; max-width:90%; max-height:90%; text-align:center; transform: translateY(-50px); transition:transform 0.3s;}
#modal.show #modal-content {transform: translateY(0);}
#modal-content img {max-width:100%; max-height:70vh; border-radius:8px;}
#modal-content button {margin-top:10px; padding:8px 15px; background:#25D366; color:white; border:none; border-radius:5px; cursor:pointer;}
#closeModal {position:absolute; top:5px; right:10px; font-size:20px; cursor:pointer; color:#800000;}
#modal-category {font-weight:bold; margin-bottom:5px;}

/* Responsive media queries */
@media screen and (max-width: 1024px) {
  .gallery {grid-template-columns: repeat(2, 1fr);}
}

@media screen and (max-width: 767px) {
  .gallery {grid-template-columns: 1fr;}
}
</style>

<script>
let currentLang='fr';
let currentImg='';
let currentCategory='';

const promoMessages = {
  fr: "Achetez un gâteau anniversaire 5000 HTG, vous recevrez une demi-douzaine de cupcakes assortis gratuits !",
  en: "Buy a birthday cake for 5000 HTG and get half a dozen assorted cupcakes free!",
  ht: "Achte yon gato anniversaire 5000 HTG, wap jwenn demi douzaine cupcakes assortis gratis!"
};

let promoBanner = document.getElementById("promoBanner");

function setLanguage(lang){
  currentLang=lang;
  if(lang==='fr'){ document.getElementById("title").innerText="Nos Réalisations"; document.getElementById("homeBtn").innerText="Retour à l'accueil";}
  if(lang==='en'){ document.getElementById("title").innerText="Our Gallery"; document.getElementById("homeBtn").innerText="Back to Home";}
  if(lang==='ht'){ document.getElementById("title").innerText="Galeri Nou"; document.getElementById("homeBtn").innerText="Tounen nan Akèy";}
  promoBanner.innerText = promoMessages[lang] || promoMessages['fr'];
}

let show = true;
setInterval(()=>{
  promoBanner.style.transform = show ? "translateY(-10px)" : "translateY(0)";
  promoBanner.style.transition = "transform 0.5s";
  show = !show;
}, 3000);

function openModal(img){
  currentImg=img.src;
  currentCategory=img.getAttribute('data-category');
  const modal=document.getElementById('modal');
  document.getElementById('modal-img').src=currentImg;
  document.getElementById('modal-category').innerText=currentCategory;
  modal.style.display='flex';
  setTimeout(()=>{ modal.classList.add('show'); },10);
}

function closeModal(){ 
  const modal=document.getElementById('modal');
  modal.classList.remove('show');
  setTimeout(()=>{ modal.style.display='none'; },300);
}

document.getElementById('whatsappBtn').addEventListener('click',()=>{
  let msg='';
  if(currentLang==='fr'){ msg=`Bonjour, je souhaite choisir une salle avec cette photo (${currentCategory}) ${currentImg}`;}
  if(currentLang==='en'){ msg=`Hello, I want to choose a room with this photo (${currentCategory}) ${currentImg}`;}
  if(currentLang==='ht'){ msg=`Bonjou, mwen vle chwazi yon sal (${currentCategory}) ak foto sa a ${currentImg}`;}
  msg=encodeURIComponent(msg);
  window.open(`https://wa.me/50942017744?text=${msg}`,'_blank');
});
</script>
