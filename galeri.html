<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galerie - ZIP Services</title>

<style>

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
}

/* 🔥 Bann Publicitaire */
.top-banner {
    width: 100%;
    background: linear-gradient(90deg, #ff512f, #dd2476);
    color: white;
    overflow: hidden;
    padding: 12px 0;
    font-weight: bold;
    font-size: 14px;
}

.banner-content {
    display: inline-block;
    white-space: nowrap;
    padding-left: 100%;
    animation: scrollBanner 20s linear infinite;
}

@keyframes scrollBanner {
    0% { transform: translateX(0); }
    100% { transform: translateX(-100%); }
}

/* Galerie */
.gallery-container {
    padding: 20px;
}

.gallery-title {
    text-align: center;
    font-size: 24px;
    margin-bottom: 20px;
    font-weight: bold;
}

.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
}

.gallery img {
    width: 100%;
    border-radius: 12px;
    cursor: pointer;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.gallery img:hover {
    transform: scale(1.05);
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

</style>
</head>

<body>

<!-- 🔥 Bann Publicitaire -->
<div class="top-banner">
  <div class="banner-content">
    🍰 Commandez vos gâteaux personnalisés dès aujourd’hui ! 
    🚚 Livraison rapide • 📍 Suivi GPS en temps réel • 💬 Contact WhatsApp direct
  </div>
</div>

<div class="gallery-container">

<div class="gallery-title">Notre Galerie</div>

<div class="gallery">

<!-- 🔴 Mete tout foto ou yo isit la san retire okenn -->

<img src="photo1.jpg">
<img src="photo2.jpg">
<img src="photo3.jpg">
<img src="photo4.jpg">
<img src="photo5.jpg">
<img src="photo6.jpg">

</div>

</div>

</body>
</html>
