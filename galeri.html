<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nos Réalisations - Aurisme Saveurs</title>
<style>
:root { --bordeaux: #800000; --gold: #DAA520; }
body { font-family: 'Segoe UI', Tahoma, sans-serif; margin:0; padding:0; background:#fdfdfd; color:#333; }

/* TICKER */
.reklam-ticker { background-color: var(--gold); color: var(--bordeaux); font-weight: bold; padding:8px 0; overflow:hidden; white-space:nowrap; border-bottom:2px solid var(--bordeaux); font-size:14px; text-transform:uppercase;}
.reklam-ticker p { display:inline-block; padding-left:100%; animation:ticker 15s linear infinite; margin:0; }
@keyframes ticker { 0%{transform:translate(0,0);} 100%{transform:translate(-100%,0);} }

/* HEADER */
header { background: var(--bordeaux); color:white; padding:20px 15px; text-align:center; border-bottom:5px solid var(--gold); position:sticky; top:0; z-index:1000; box-shadow:0 4px 10px rgba(0,0,0,0.2); }
.title-fancy { margin:0 0 15px 0; font-size:28px; letter-spacing:2px; text-transform:uppercase; font-weight:900; color:white; text-shadow:2px 2px 4px rgba(0,0,0,0.5); display:inline-block; }
.title-fancy::after { content:''; display:block; width:50%; height:3px; background: var(--gold); margin:5px auto; border-radius:2px; }

/* NAV BUTTONS */
.nav-buttons { display:flex; gap:10px; justify-content:center; align-items:center; }
.btn-nav { display:inline-flex; align-items:center; justify-content:center; text-decoration:none; font-weight:bold; transition:0.3s; border:2px solid transparent; }
.btn-back { padding:10px 20px; border-radius:50px; font-size:13px; text-transform:uppercase; background: linear-gradient(135deg, var(--gold) 0%, #B8860B 100%); color: var(--bordeaux); border-color: var(--bordeaux); }
.btn-social { width:40px; height:40px; border-radius:10px; font-size:20px; color:white; display:flex; align-items:center; justify-content:center; }
.btn-fb-top { background-color:#1877F2; }
.btn-tiktok-top { background-color:#000; }
.btn-nav:hover { opacity:0.85; transform:translateY(-3px); }
.btn-social:hover { filter: brightness(1.2); }

/* GRID FOTO */
.container { padding:20px; max-width:1200px; margin:auto; }
.grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap:20px; }
.card { background:#fff; border-radius:12px; overflow:hidden; box-shadow:0 4px 8px rgba(0,0,0,0.1); border:1px solid #eee; aspect-ratio:1 / 1; cursor:pointer; transition: transform 0.3s ease, box-shadow 0.3s ease; }
.card img { width:100%; height:100%; object-fit:cover; transition: transform 0.4s ease, box-shadow 0.4s ease; }
.card img:hover { transform: scale(1.05); box-shadow:0 8px 20px rgba(0,0,0,0.3); }

/* LIGHTBOX */
#lightbox { position:fixed; z-index:10000; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:none; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; opacity:0; transition:opacity 0.3s ease; }
#lightbox.show { display:flex; opacity:1; }
#lightbox img { max-width:90%; max-height:75%; border-radius:5px; border:3px solid var(--gold); transform: scale(0.7); transition: transform 0.3s ease; }
#lightbox.show img { transform: scale(1); }
#lightbox .caption { background: rgba(0,0,0,0.5); color: var(--gold); font-size:24px; font-weight:bold; margin-top:15px; padding:5px 15px; border-radius:5px; text-transform:uppercase; letter-spacing:3px; text-shadow:1px 1px 5px rgba(0,0,0,0.8); }
#lightbox .prev, #lightbox .next { position:absolute; top:50%; transform:translateY(-50%); font-size:50px; color: var(--gold); cursor:pointer; user-select:none; padding:10px; border-radius:5px; background:rgba(0,0,0,0.3); }
#lightbox .prev { left:20px; }
#lightbox .next { right:20px; }

/* BOUTON SMS */
.sms-float { position:fixed; width:60px; height:60px; bottom:20px; right:20px; background-color:#007AFF; color:white; border-radius:50px; text-align:center; font-size:30px; box-shadow:2px 4px 12px rgba(0,0,0,0.3); z-index:9999; display:flex; align-items:center; justify-content:center; text-decoration:none; border:2px solid white; animation:sms-pulse 2s infinite; }
@keyframes sms-pulse {0%{box-shadow:0 0 0 0 rgba(0,122,255,0.6);} 70%{box-shadow:0 0 0 15px rgba(0,122,255,0);} 100%{box-shadow:0 0 0 0 rgba(0,122,255,0);} }

/* FOOTER */
footer { text-align:center; padding:40px 20px; color:#777; font-size:13px; }

/* RESPONSIVE */
@media(max-width:600px){
  .container { padding:10px; }
  .grid { gap:10px; }
  .title-fancy { font-size:22px; }
  #lightbox .caption { font-size:18px; }
  #lightbox .prev, #lightbox .next { font-size:30px; padding:5px; }
}
</style>
</head>
<body>

<div class="reklam-ticker"><p>✨ Aurisme Saveurs : Le goût allié à l'excellence ! — Commandez dès maintenant ✨</p></div>

<header>
<h1 class="title-fancy">Nos Réalisations</h1><br>
<div class="nav-buttons">
<a href="index.html" class="btn-nav btn-back">⬅ ACCUEIL</a>
<a href="https://www.facebook.com/Zipservices" target="_blank" class="btn-nav btn-social btn-fb-top" title="Facebook">f</a>
<a href="https://www.tiktok.com/@gateauxetfriandises" target="_blank" class="btn-nav btn-social btn-tiktok-top" title="TikTok">♪</a>
</div>
</header>

<div class="container">
<div class="grid" id="gallery">
<!-- Foto ou yo, kenbe tout menm jan -->
<div class="card"><img src="https://i.imgur.com/Jvun9zx.jpg" loading="lazy"></div>
<div class="card"><img src="https://i.imgur.com/7Yg5Uvq.jpg" loading="lazy"></div>
<div class="card"><img src="https://i.imgur.com/xU0AesJ.jpg" loading="lazy"></div>
<div class="card"><img src="https://i.imgur.com/cUigiKa.jpg" loading="lazy"></div>
<!-- ajoute rès foto yo menm jan -->
</div>
</div>

<div id="lightbox" onclick="closeLightbox(event)">
  <span class="prev" onclick="prev(event)">&#10094;</span>
  <img id="lightbox-img" src="">
  <span class="next" onclick="next(event)">&#10095;</span>
  <div class="caption">Aurisme Saveurs</div>
</div>

<a href="sms:+50942017744?body=Bonjour Aurisme Saveurs, je souhaite avoir des informations sur vos services." class="sms-float">✉️</a>

<footer><p>&copy; 2026 Aurisme Saveurs et Services</p></footer>

<script>
let images = [];
let currentIndex = 0;
const gallery = document.getElementById('gallery');
gallery.querySelectorAll('img').forEach(img => images.push(img.src));

function openLightbox(src){
    const lb = document.getElementById('lightbox');
    currentIndex = images.indexOf(src);
    document.getElementById('lightbox-img').src = src;
    lb.classList.add('show');
}

function closeLightbox(e){
    if(e.target.id === 'lightbox') document.getElementById('lightbox').classList.remove('show');
}

function prev(e){
    e.stopPropagation();
    currentIndex = (currentIndex - 1 + images.length) % images.length;
    document.getElementById('lightbox-img').src = images[currentIndex];
}

function next(e){
    e.stopPropagation();
    currentIndex = (currentIndex + 1) % images.length;
    document.getElementById('lightbox-img').src = images[currentIndex];
}
</script>

</body>
</html>
