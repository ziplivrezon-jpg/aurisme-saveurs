<style>
:root {--bordeaux:#800000; --gold:#DAA520;}
body{margin:0;font-family:Arial,sans-serif;background:#f9f9f9;}
header{background:var(--bordeaux);color:white;padding:15px;text-align:center;}
.lang-buttons{text-align:center;margin:10px;}
.lang-buttons button, .filter-btns button{padding:8px 12px;margin:5px;border:none;cursor:pointer;background:var(--gold);color:white;border-radius:5px;}
.back-btn{display:block;width:150px;margin:15px auto;text-align:center;padding:10px;background:var(--bordeaux);color:white;text-decoration:none;border-radius:5px;}
.filter-btns{text-align:center;margin:15px 0;}
.section{padding:20px;}
.section h2{color:var(--bordeaux);}
.gallery{display:grid;grid-template-columns:repeat(auto-fit, minmax(150px,1fr));gap:10px;}
.gallery img{width:100%;border-radius:8px;cursor:pointer;transition: transform 0.3s;}
.gallery img:hover{transform: scale(1.05);}
#lightbox{position:fixed;top:0;left:0;width:100%;height:100%;background: rgba(0,0,0,0.8);display:none;justify-content:center;align-items:center;z-index:1000;}
#lightbox img{max-width:90%;max-height:90%;border-radius:10px;}
#lightbox:target{display:flex;}
</style>
</head>

<script>
let currentLang = 'fr'; 

function setLanguage(lang){
    currentLang = lang; 
    if(lang === "fr"){ document.getElementById("title").innerText = "Nos Réalisations"; document.getElementById("homeBtn").innerText = "Retour à l'accueil";}
    if(lang === "en"){ document.getElementById("title").innerText = "Our Gallery"; document.getElementById("homeBtn").innerText = "Back to Home";}
    if(lang === "ht"){ document.getElementById("title").innerText = "Galeri Nou"; document.getElementById("homeBtn").innerText = "Tounen nan Akèy";}
}

function filterCategory(category){
    const items = document.querySelectorAll('.gallery-item');
    items.forEach(item=>{
        if(category==='all'){item.style.display='block';}
        else{item.classList.contains(category)?item.style.display='block':item.style.display='none';}
    });
}

function openLightbox(img){
    document.getElementById('lightbox-img').src = img.src;
    document.getElementById('lightbox').style.display='flex';
}

function sendWhatsApp(imgSrc){
    let msg = "";
    if(currentLang === "fr"){ msg = `Bonjour, je souhaite choisir une salle avec cette photo ${imgSrc}`;}
    else if(currentLang === "en"){ msg = `Hello, I want to choose a room with this photo ${imgSrc}`;}
    else if(currentLang === "ht"){ msg = `Bonjou, mwen vle chwazi yon sal ak foto sa a ${imgSrc}`;}
    msg = encodeURIComponent(msg);
    window.open(`https://wa.me/50942017744?text=${msg}`, '_blank');
}
</script>
