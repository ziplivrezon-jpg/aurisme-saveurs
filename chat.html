<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat & Voice - Aurisme Saveurs et Services</title>
<style>
  body { font-family: Arial, sans-serif; margin:0; padding:0; background:#f4f4f4; }
  header { display:flex; align-items:center; justify-content:space-between; padding:10px 20px; border-bottom:2px solid #007BFF; background:#fff; }
  header img { height:60px; }
  header .company-name { font-size:20px; font-weight:bold; color:#007BFF; margin-left:10px; }
  header a { text-decoration:none; background:#28a745; color:white; padding:10px 20px; border-radius:5px; font-weight:bold; }
  
  #messages { border:1px solid #ccc; height:300px; overflow-y:scroll; padding:10px; margin:10px 20px; background:#fff; border-radius:5px; }
  .message { padding:5px 10px; border-radius:5px; margin-bottom:5px; max-width:80%; }
  .message.mine { background:#007BFF; color:white; margin-left:auto; }
  .message.other { background:#e0e0e0; color:black; margin-right:auto; }
  
  #input { width:70%; padding:8px; margin:10px 20px; border-radius:5px; border:1px solid #ccc; }
  #send { padding:8px 12px; margin-left:10px; border-radius:5px; background:#007BFF; color:white; border:none; cursor:pointer; }
  #call { margin:10px 20px; padding:10px 20px; background:#28a745; color:white; border:none; border-radius:5px; cursor:pointer; }
  h2 { margin-left:20px; color:#007BFF; }
</style>
</head>
<body>

<!-- Header ak Logo + Non Konpayi + Bouton Home -->
<header>
  <div style="display:flex; align-items:center;">
    <img src="Logo.png" alt="Logo Konpayi">
    <span class="company-name">Aurisme Saveurs et Services</span>
  </div>
  <a href="index.html">Tounen sou Akèy</a>
</header>

<h2>Chat</h2>
<div id="messages"></div>
<input type="text" id="input" placeholder="Ekri mesaj ou...">
<button id="send">Voye</button>

<h2>Voice Call</h2>
<button id="call">Klike pou Voice Call</button>

<!-- Firebase JS -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<!-- Twilio JS SDK -->
<script src="https://sdk.twilio.com/js/client/v1.13/twilio.min.js"></script>

<script>
  // === Firebase Config ===
  const firebaseConfig = {
    apiKey: "API_KEY",
    authDomain: "PROJECT_ID.firebaseapp.com",
    databaseURL: "https://PROJECT_ID.firebaseio.com",
    projectId: "PROJECT_ID",
    storageBucket: "PROJECT_ID.appspot.com",
    messagingSenderId: "SENDER_ID",
    appId: "APP_ID"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  const messagesDiv = document.getElementById('messages');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('send');

  const currentUserId = 'user_123'; // mete id itilizatè w la

  // Voye mesaj
  sendBtn.addEventListener('click', () => {
    const text = input.value.trim();
    if(text) {
      db.ref('messages').push({ text, timestamp: Date.now(), sender: currentUserId });
      input.value = '';
    }
  });

  // Resevwa mesaj an tan reyèl
  db.ref('messages').on('child_added', snapshot => {
    const msg = snapshot.val();
    const div = document.createElement('div');
    div.textContent = msg.text;
    div.classList.add('message');
    if(msg.sender === currentUserId) div.classList.add('mine');
    else div.classList.add('other');
    messagesDiv.appendChild(div);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  });

  // === Twilio Voice Call ===
  const callBtn = document.getElementById('call');
  let device;

  async function setupVoiceCall() {
    const res = await fetch('/api/get-twilio-token');
    const data = await res.json();
    const token = data.token;

    device = new Twilio.Device(token, { debug: true });

    device.on('ready', () => console.log('Twilio Device ready'));
    device.on('error', err => console.error('Device error:', err));
    device.on('incoming', conn => {
      if(confirm("Ou gen yon apèl! Reponn?")) conn.accept();
    });
  }

  setupVoiceCall();

  callBtn.addEventListener('click', () => {
    if(!device) return alert('Device pa pare');
    const params = { To: 'user_1' }; // ranplase ak id itilizatè ou vle rele
    const conn = device.connect(params);
    conn.on('accept', () => console.log('Apèl konekte'));
    conn.on('disconnect', () => console.log('Apèl fini'));
  });
</script>

</body>
</html>
