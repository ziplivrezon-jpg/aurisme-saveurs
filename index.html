<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurisme Saveurs et Services</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
:root{--bordeaux:#800000;--gold:#DAA520;--navy:#003366;}
body{font-family:'Segoe UI',sans-serif;margin:0;padding:0;background:#f8f8f8;text-align:center;}

.security-header {background:var(--navy); color:white; padding:8px; font-size:13px; font-weight:bold; display:flex; justify-content:center; align-items:center; gap:8px;}
.security-header i {color: #4CAF50;}

.lang-bar-fixed{position:sticky; top:0; background:white; padding:10px 0; display:flex; justify-content:center; z-index:9999; box-shadow:0 2px 5px rgba(0,0,0,0.1);}
.lang-bar-fixed button{margin:0 8px; padding:8px 15px; border:none; border-radius:20px; cursor:pointer; background:#eee; color:var(--navy); font-weight:bold; font-size:14px;}

.reklam-ticker{background:var(--gold); color:var(--bordeaux); font-weight:bold; padding:12px 0; overflow:hidden; white-space:nowrap; border-bottom:2px solid var(--bordeaux);}
.reklam-ticker p{display:inline-block; padding-left:100%; animation:ticker 20s linear infinite; margin:0; font-size:16px; text-transform:uppercase;}
@keyframes ticker{0%{transform:translate(0,0);}100%{transform:translate(-100%,0);}}

header{background:var(--bordeaux); color:white; padding:30px 20px; border-bottom:4px solid var(--gold);}
.logo-container img{width:100px; height:100px; border-radius:50%; border:3px solid var(--gold); background:white; object-fit:cover;}

.menu-grid{display:grid; grid-template-columns:1fr 1fr; gap:15px; margin:20px;}
.menu-card{background:white; padding:25px 10px; border-radius:20px; text-align:center; text-decoration:none; color:var(--navy); font-weight:bold; box-shadow:0 10px 20px rgba(0,0,0,0.1); border-bottom:4px solid var(--gold); display:flex; flex-direction:column; align-items:center;}
.menu-card i{font-size:35px; color:var(--bordeaux); margin-bottom:10px;}

.collapsible-box{background:white; border-radius:20px; box-shadow:0 6px 15px rgba(0,0,0,0.1); margin:20px 10px; overflow:hidden; border-left:5px solid var(--bordeaux);}
.collapsible-btn{background:white; width:100%; padding:20px; border:none; text-align:left; font-size:16px; font-weight:bold; color:var(--navy); cursor:pointer; display:flex; justify-content:space-between; align-items:center;}
.collapsible-content{display:none; padding:0 20px 20px 20px; text-align:left;}

input, select, textarea{width:100%; padding:12px; margin:10px 0; border:1px solid #ddd; border-radius:10px; box-sizing:border-box; font-family:inherit;}
.btn-order{background-color:var(--bordeaux); color:white; border:none; padding:16px; width:100%; border-radius:10px; font-size:16px; font-weight:bold; cursor:pointer;}

.footer-info{background:#eee; padding:25px; border-radius:20px; margin-top:30px; font-size:13px;}
</style>
</head>
<body>

<div class="security-header">
    <i class="fas fa-shield-alt"></i> <span id="sec-text">Verified Service & Secured Delivery</span>
</div>

<div class="lang-bar-fixed">
    <button onclick="changeLanguage('fr')">FR</button>
    <button onclick="changeLanguage('en')">EN</button>
    <button onclick="changeLanguage('ht')">HT</button>
</div>

<div class="reklam-ticker">
    <p id="ad-text">🌟 VETIHKAM LE BON PARFUM VÉTIVER — DISPONIBLE MAINTENANT ! 🌟</p>
</div>

<header>
    <div class="logo-container"><img src="Logo.png" alt="Logo Aurisme"></div>
    <h1 id="main-title">Aurisme Saveurs et Services</h1>
</header>

<div class="container">
    <div class="menu-grid">
        <a href="livrezon.html" class="menu-card"><i class="fas fa-truck"></i><span id="m-liv">LIVRAISON</span></a>
        <a href="taxi.html" class="menu-card"><i class="fas fa-motorcycle"></i><span id="m-tax">TAXI MOTO</span></a>
        <a href="academy.html" class="menu-card"><i class="fas fa-graduation-cap"></i><span id="m-aca">ACADEMY</span></a>
        <a href="patisserie.html" class="menu-card"><i class="fas fa-birthday-cake"></i><span id="m-pat">PÂTISSERIE</span></a>
        <a href="decoration.html" class="menu-card"><i class="fas fa-utensils"></i><span id="m-dec">DÉCO & TRAITEUR</span></a>
        <a href="galeri.html" class="menu-card"><i class="fas fa-images"></i><span id="m-gal">GALERIE</span></a>
    </div>

    <div class="collapsible-box">
        <button class="collapsible-btn" onclick="toggleBox('box-super')"><span id="t-sup">🛒 Service Supermarché</span> <i class="fas fa-chevron-down"></i></button>
        <div id="box-super" class="collapsible-content">
            <label id="lbl-m">Choisir Marché:</label>
            <select id="market-name">
                <option>Star Market</option>
                <option>Bonjan Market</option>
                <option>Juvénat Market</option>
                <option>Déli Mart</option>
                <option>Giant Supermarket</option>
            </select>
            <textarea id="market-list" placeholder="Liste des produits..."></textarea>
            <button class="btn-order" id="btn-sup" onclick="sendWA('Supermarché')">COMMANDER WHATSAPP</button>
        </div>
    </div>

    <div class="collapsible-box" style="border-left-color: var(--navy);">
        <button class="collapsible-btn" onclick="toggleBox('box-ti')" style="color: var(--navy);"><span id="t-res">🏪 Espace Ti Machann</span> <i class="fas fa-chevron-down"></i></button>
        <div id="box-ti" class="collapsible-content">
            <label id="lbl-p">Veuillez choisir un produit:</label>
            <select id="resell-prod">
                <option>Sable</option>
                <option>Palmier</option>
                <option>Sacristain</option>
                <option>Coconuts</option>
                <option>Cookies</option>
                <option>Langue de boeufs</option>
                <option>Pâtés</option>
                <option>Cupcakes</option>
                <option>Gâteau ti bol</option>
                <option>Gâteau 12"</option>
                <option>Cookies raisin</option>
            </select>
            <input type="text" id="ph-qty" placeholder="Quantité souhaitée...">
            <button class="btn-order" style="background:var(--navy);" id="btn-res" onclick="sendWA('Ti Machann')">COMMANDER EN GROS</button>
        </div>
    </div>

    <div class="collapsible-box" style="border-left-color: var(--gold);">
        <button class="collapsible-btn" onclick="toggleBox('box-tour')"><span id="t-tour">🌍 Tourist Assistance</span> <i class="fas fa-chevron-down"></i></button>
        <div id="box-tour" class="collapsible-content">
            <input type="text" id="tour-name" placeholder="Nom Complet / Full Name">
            <textarea id="tour-help" placeholder="Besoin d'aide?"></textarea>
            <button class="btn-order" style="background:var(--gold);" id="btn-tour" onclick="sendWA('Tourist Help')">DEMANDER DE L'AIDE</button>
        </div>
    </div>
</div>

<div class="footer-info">
    <p>📧 gâteaux.friandise@gmail.com | 📞 +509 4201-7744</p>
    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d121016.91142562477!2d-72.3995663!3d18.5714486!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8eb9e06385d56411%3A0xc3f8e653069e25e1!2sPort-au-Prince!5e0!3m2!1sfr!2sht!4v1709400000000" width="100%" height="250" style="border:0; border-radius:20px;" allowfullscreen="" loading="lazy"></iframe>
    <br><br>
    <a href="privacy.html" id="priv-link" style="color:var(--navy); font-weight:bold; text-decoration:none;">🔒 Privacy Policy / Confidentialité</a>
</div>

<script>
function toggleBox(id) {
    var content = document.getElementById(id);
    content.style.display = (content.style.display === "block") ? "none" : "block";
}

const translations = {
    fr: {
        sec: "Service Vérifié & Livraison Sécurisée", ad: "🌟 VETIHKAM LE BON PARFUM VÉTIVER — DISPONIBLE MAINTENANT ! 🌟",
        title: "Aurisme Saveurs et Services", sup: "🛒 Service Supermarché", res: "🏪 Espace Ti Machann", tour: "🌍 Tourist Assistance",
        l: "LIVRAISON", t: "TAXI MOTO", a: "ACADEMY", p: "PÂTISSERIE", d: "DÉCO & TRAITEUR", g: "GALERIE",
        m_lbl: "Choisir Marché:", p_lbl: "Veuillez choisir un produit:", b_wa: "COMMANDER WHATSAPP", b_res: "COMMANDER EN GROS", b_tour: "DEMANDER DE L'AIDE"
    },
    en: {
        sec: "Verified Service & Secured Delivery", ad: "🌟 VETIHKAM THE BEST VETIVER PERFUME — AVAILABLE NOW! 🌟",
        title: "Aurisme Flavors and Services", sup: "🛒 Supermarket Service", res: "🏪 Reseller Space", tour: "🌍 Tourist Assistance",
        l: "DELIVERY", t: "MOTO TAXI", a: "ACADEMY", p: "BAKERY", d: "DECO & CATERING", g: "GALLERY",
        m_lbl: "Choose Market:", p_lbl: "Please choose a product:", b_wa: "ORDER VIA WHATSAPP", b_res: "ORDER BULK", b_tour: "REQUEST ASSISTANCE"
    },
    ht: {
        sec: "Sèvis Verifye ak Livrezon an Sekirite", ad: "🌟 VETIHKAM BON PARFEN VETIVÈ — LI DISPONIB KOUNYA! 🌟",
        title: "Aurisme Saveurs ak Sèvis", sup: "🛒 Sèvis Sipèmache", res: "🏪 Espas Ti Machann", tour: "🌍 Asistans Touris",
        l: "LIVREZON", t: "TAKSI MOTO", a: "AKADEMI", p: "PATISERI", d: "DEKO & TRAITEUR", g: "GALERI",
        m_lbl: "Chwazi Mache:", p_lbl: "Tanpri chwazi yon pwodwi:", b_wa: "KOMANDE SOU WHATSAPP", b_res: "KOMANDE AN GWO", b_tour: "MANDE ED"
    }
};

function changeLanguage(lang) {
    const t = translations[lang];
    document.getElementById('sec-text').innerText = t.sec;
    document.getElementById('ad-text').innerText = t.ad;
    document.getElementById('main-title').innerText = t.title;
    document.getElementById('t-sup').innerText = t.sup;
    document.getElementById('t-res').innerText = t.res;
    document.getElementById('t-tour').innerText = t.tour;
    document.getElementById('m-liv').innerText = t.l;
    document.getElementById('m-tax').innerText = t.t;
    document.getElementById('m-aca').innerText = t.a;
    document.getElementById('m-pat').innerText = t.p;
    document.getElementById('m-dec').innerText = t.d;
    document.getElementById('m-gal').innerText = t.g;
    document.getElementById('lbl-m').innerText = t.m_lbl;
    document.getElementById('lbl-p').innerText = t.p_lbl;
    document.getElementById('btn-sup').innerText = t.b_wa;
    document.getElementById('btn-res').innerText = t.b_res;
    document.getElementById('btn-tour').innerText = t.b_tour;
    localStorage.setItem('lang', lang);
}

function sendWA(service) {
    const market = document.getElementById('market-name').value;
    const prod = document.getElementById('resell-prod').value;
    const qty = document.getElementById('ph-qty').value;
    let msg = `Bonjour Aurisme, je souhaite commander via le service ${service}`;
    if(service === 'Ti Machann') msg += `: ${prod} (Quantité: ${qty})`;
    window.open(`https://wa.me/50942017744?text=${encodeURIComponent(msg)}`);
}

window.onload = function() {
    changeLanguage(localStorage.getItem('lang') || 'fr');
};
</script>
</body>
</html>
