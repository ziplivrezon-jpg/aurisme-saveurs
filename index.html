<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurisme Saveurs et Services</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
:root{--bordeaux:#800000;--gold:#DAA520;--navy:#003366;}
body{font-family:'Segoe UI',Tahoma,sans-serif;margin:0;padding:0;background:#f8f8f8;text-align:center;}
.lang-bar-fixed{position:fixed;top:0;left:0;width:100%;background:var(--navy);padding:8px 0;display:flex;justify-content:center;z-index:9999;box-shadow:0 4px 6px rgba(0,0,0,0.2);}
.lang-bar-fixed button{margin:0 10px;padding:6px 12px;border:none;border-radius:6px;cursor:pointer;background:var(--gold);color:var(--bordeaux);font-weight:bold;font-size:14px;}
.reklam-ticker{background:var(--gold);color:var(--bordeaux);font-weight:bold;padding:12px 0;overflow:hidden;white-space:nowrap;border-bottom:2px solid var(--bordeaux);margin-top:45px;}
.reklam-ticker p{display:inline-block;padding-left:100%;animation:ticker 20s linear infinite;margin:0;font-size:16px;text-transform:uppercase;}
@keyframes ticker{0%{transform:translate(0,0);}100%{transform:translate(-100%,0);}}
header{background:var(--bordeaux);color:white;padding:30px 20px;border-bottom:4px solid var(--gold);}
.logo-container img{width:100px;height:100px;border-radius:50%;border:3px solid var(--gold);background:white;object-fit:cover;}
.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin:20px;}
.menu-card{background:white;padding:25px 10px;border-radius:20px;text-align:center;text-decoration:none;color:var(--navy);font-weight:bold;box-shadow:0 10px 20px rgba(0,0,0,0.1);border-bottom:4px solid var(--gold);display:flex;flex-direction:column;align-items:center;}
.menu-card i{font-size:35px;color:var(--bordeaux);margin-bottom:10px;}
.collapsible-box{background:white;border-radius:20px;box-shadow:0 6px 15px rgba(0,0,0,0.1);margin:20px 10px;overflow:hidden;border-left:5px solid var(--bordeaux);}
.collapsible-btn{background:white;width:100%;padding:20px;border:none;text-align:left;font-size:16px;font-weight:bold;color:var(--navy);cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
.collapsible-content{display:none;padding:0 20px 20px 20px;text-align:left;}
input,select,textarea{width:100%;padding:12px;margin:10px 0;border:1px solid #ddd;border-radius:10px;box-sizing:border-box;}
.btn-order{background-color:var(--bordeaux);color:white;border:none;padding:16px;width:100%;border-radius:10px;font-size:16px;font-weight:bold;cursor:pointer;}
.footer-info{background:#eee;padding:25px;border-radius:20px;margin-top:30px;font-size:13px;}
</style>
</head>
<body>

<div class="lang-bar-fixed">
    <button onclick="changeLanguage('fr')">🇫🇷 FR</button>
    <button onclick="changeLanguage('en')">🇺🇸 EN</button>
    <button onclick="changeLanguage('ht')">🇭🇹 HT</button>
</div>

<div class="reklam-ticker">
    <p id="ad-text">🌟 VETIHKAM LE BON PARFUM VÉTIVER — DISPONIBLE MAINTENANT ! 🌟</p>
</div>

<header>
    <div class="logo-container"><img src="Logo.png" alt="Logo Aurisme"></div>
    <h1 id="main-title">Aurisme Saveurs et Services</h1>
</header>

<div class="container">
    <div class="menu-grid">
        <a href="livrezon.html" class="menu-card"><i class="fas fa-truck"></i><span id="menu-livraison">LIVRAISON</span></a>
        <a href="taxi.html" class="menu-card"><i class="fas fa-motorcycle"></i><span id="menu-taxi">TAXI MOTO</span></a>
        <a href="academy.html" class="menu-card"><i class="fas fa-graduation-cap"></i><span id="menu-academy">ACADEMY</span></a>
        <a href="patisserie.html" class="menu-card"><i class="fas fa-birthday-cake"></i><span id="menu-patisserie">PÂTISSERIE</span></a>
        <a href="decoration.html" class="menu-card"><i class="fas fa-utensils"></i><span id="menu-decoration">DÉCO & TRAITEUR</span></a>
        <a href="galeri.html" class="menu-card"><i class="fas fa-images"></i><span id="menu-galeri">GALERIE</span></a>
    </div>

    <div class="collapsible-box">
        <button class="collapsible-btn" onclick="toggleBox('m1')"><span id="box-super">🛒 Service Supermarché</span> <i class="fas fa-chevron-down"></i></button>
        <div id="m1" class="collapsible-content">
            <textarea id="p1" placeholder="Liste des produits..."></textarea>
            <button class="btn-order" id="b1" onclick="window.open('https://wa.me/50942017744')">COMMANDER WHATSAPP</button>
        </div>
    </div>

    <div class="collapsible-box" style="border-left-color: var(--navy);">
        <button class="collapsible-btn" onclick="toggleBox('m2')" style="color: var(--navy);"><span id="box-resell">🏪 Espace Ti Machann</span> <i class="fas fa-chevron-down"></i></button>
        <div id="m2" class="collapsible-content">
            <input type="text" id="p2" placeholder="Quantité souhaitée...">
            <button class="btn-order" id="b2" style="background:var(--navy);" onclick="window.open('https://wa.me/50942017744')">COMMANDER EN GROS</button>
        </div>
    </div>
</div>

<div class="footer-info">
    <iframe src="https://www.google.com/maps/embed?pb=..." width="100%" height="200" style="border:0;border-radius:20px;"></iframe>
    <br><br>
    <a href="privacy.html" id="priv" style="color:var(--navy); font-weight:bold; text-decoration:none;">🔒 Privacy Policy / Confidentialité</a>
</div>

<script>
function toggleBox(id) {
    var content = document.getElementById(id);
    content.style.display = (content.style.display === "block") ? "none" : "block";
}

const translations = {
    fr: {
        ad: "🌟 VETIHKAM LE BON PARFUM VÉTIVER — DISPONIBLE MAINTENANT ! 🌟",
        title: "Aurisme Saveurs et Services", super: "🛒 Service Supermarché", resell: "🏪 Espace Ti Machann",
        l: "LIVRAISON", t: "TAXI MOTO", a: "ACADEMY", p: "PÂTISSERIE", d: "DÉCO & TRAITEUR", g: "GALERIE",
        b: "COMMANDER WHATSAPP", bg: "COMMANDER EN GROS", ph1: "Liste des produits...", ph2: "Quantité..."
    },
    en: {
        ad: "🌟 VETIHKAM THE BEST VETIVER PERFUME — AVAILABLE NOW! 🌟",
        title: "Aurisme Flavors and Services", super: "🛒 Supermarket Service", resell: "🏪 Reseller Space",
        l: "DELIVERY", t: "MOTO TAXI", a: "ACADEMY", p: "BAKERY", d: "DECO & CATERING", g: "GALLERY",
        b: "ORDER VIA WHATSAPP", bg: "ORDER BULK", ph1: "Product list...", ph2: "Quantity..."
    },
    ht: {
        ad: "🌟 VETIHKAM BON PARFEN VETIVÈ — LI DISPONIB KOUNYA! 🌟",
        title: "Aurisme Saveurs ak Sèvis", super: "🛒 Sèvis Sipèmache", resell: "🏪 Espas Ti Machann",
        l: "LIVREZON", t: "TAKSI MOTO", a: "AKADEMI", p: "PATISERI", d: "DEKO & TRAITEUR", g: "GALERI",
        b: "KOMANDE SOU WHATSAPP", bg: "KOMANDE AN GWO", ph1: "Lis pwodwi yo...", ph2: "Kantite..."
    }
};

function changeLanguage(lang) {
    const t = translations[lang];
    document.getElementById('ad-text').innerText = t.ad;
    document.getElementById('main-title').innerText = t.title;
    document.getElementById('box-super').innerText = t.super;
    document.getElementById('box-resell').innerText = t.resell;
    document.getElementById('menu-livraison').innerText = t.l;
    document.getElementById('menu-taxi').innerText = t.t;
    document.getElementById('menu-academy').innerText = t.a;
    document.getElementById('menu-patisserie').innerText = t.p;
    document.getElementById('menu-decoration').innerText = t.d;
    document.getElementById('menu-galeri').innerText = t.g;
    document.getElementById('b1').innerText = t.b;
    document.getElementById('b2').innerText = t.bg;
    document.getElementById('p1').placeholder = t.ph1;
    document.getElementById('p2').placeholder = t.ph2;
    localStorage.setItem('lang', lang);
}

window.onload = function() {
    changeLanguage(localStorage.getItem('lang') || 'fr');
};
</script>
</body>
</html>
