<!DOCTYPE html>
<html lang="ht">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurisme Saveurs et Services</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script type="text/javascript">
  (function(){
      // Public Key ou a
      emailjs.init("-QYhlIQKH8q-aZkZa");
  })();
</script>

<style>
:root{--bordeaux:#800000;--gold:#DAA520;--navy:#003366;--vetiver-green:#1b4d3e;}
body{font-family:'Segoe UI',sans-serif;margin:0;padding:0;background:#f8f8f8;text-align:center;}
.promo-banner { background: var(--vetiver-green); color: white; overflow: hidden; white-space: nowrap; padding: 10px 0; font-size: 15px; font-weight: bold; border-bottom: 3px solid var(--gold); }
.promo-scroll { display: inline-block; padding-left: 100%; animation: scroll-text 15s linear infinite; }
@keyframes scroll-text { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
.lang-bar-fixed{position:sticky; top:0; background:white; padding:10px 0; display:flex; justify-content:center; z-index:9999; box-shadow:0 2px 5px rgba(0,0,0,0.1);}
.lang-bar-fixed button{margin:0 8px; padding:8px 15px; border:none; border-radius:20px; cursor:pointer; background:#eee; color:var(--navy); font-weight:bold; font-size:14px;}
header{background:var(--bordeaux); color:white; padding:30px 20px; border-bottom:4px solid var(--gold);}
.logo-container img{width:100px; height:100px; border-radius:50%; border:3px solid var(--gold); background:white; object-fit:cover;}
.menu-grid{display:grid; grid-template-columns:1fr 1fr; gap:15px; margin:20px;}
.menu-card{background:white; padding:25px 10px; border-radius:20px; text-align:center; text-decoration:none; color:var(--navy); font-weight:bold; box-shadow:0 10px 20px rgba(0,0,0,0.1); border-bottom:4px solid var(--gold); display:flex; flex-direction:column; align-items:center;}
.menu-card i{font-size:35px; color:var(--bordeaux); margin-bottom:10px;}
.collapsible-box{background:white; border-radius:20px; box-shadow:0 6px 15px rgba(0,0,0,0.1); margin:20px 10px; overflow:hidden; border-left:5px solid var(--bordeaux);}
.collapsible-btn{background:white; width:100%; padding:20px; border:none; text-align:left; font-size:16px; font-weight:bold; color:var(--navy); cursor:pointer; display:flex; justify-content:space-between; align-items:center;}
.collapsible-content{display:none; padding:15px; text-align:left;}
.product-list-container { max-height: 250px; overflow-y: auto; background: #f9f9f9; padding: 10px; border-radius: 10px; border: 1px solid #ddd;}
.product-item { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; background: white; padding: 8px; border-radius: 8px;}
input, select, textarea{width:100%; padding:12px; margin:10px 0; border:1px solid #ddd; border-radius:10px; box-sizing:border-box;}
.btn-order{background-color:var(--bordeaux); color:white; border:none; padding:16px; width:100%; border-radius:10px; font-size:16px; font-weight:bold; cursor:pointer;}
</style>
</head>
<body>

<div class="lang-bar-fixed">
    <button onclick="changeLanguage('fr')">FR</button>
    <button onclick="changeLanguage('en')">EN</button>
    <button onclick="changeLanguage('ht')">HT</button>
</div>

<header>
    <div class="logo-container"><img src="Logo.png" alt="Logo Aurisme"></div>
    <h1 id="main-title">Aurisme Saveurs et Services</h1>
</header>

<div class="container">
    <div class="menu-grid">
        <a href="livrezon.html" class="menu-card"><i class="fas fa-truck"></i><span id="m-liv">LIVREZON</span></a>
        <a href="taxi.html" class="menu-card"><i class="fas fa-motorcycle"></i><span id="m-tax">TAKSI MOTO</span></a>
        <a href="academy.html" class="menu-card"><i class="fas fa-graduation-cap"></i><span id="m-aca">AKADEMI</span></a>
        <a href="patisserie.html" class="menu-card"><i class="fas fa-birthday-cake"></i><span id="m-pat">PATISRI</span></a>
    </div>

    <div class="collapsible-box">
        <button class="collapsible-btn" onclick="toggleBox('box-super')"><span id="t-sup">🛒 Sèvis Sipèmache</span> <i class="fas fa-chevron-down"></i></button>
        <div id="box-super" class="collapsible-content">
            <input type="text" id="super-name" placeholder="Non ou ak Telefòn ou" required>
            <select id="market-select">
                <option>Star Market</option><option>Bonjan Market</option><option>Juvénat Market</option>
            </select>
            <div class="product-list-container" id="aurisme-list"></div>
            <textarea id="market-others-list" placeholder="Lòt pwodwi ou bezwen..."></textarea>
            <button class="btn-order" id="btn-sup" onclick="voyeEmailJS('Sipèmache')">KOMANDE KOUNYA</button>
        </div>
    </div>
</div>

<script>
let currentLang = 'ht';
const products = { ht: ["Gato ti bòl", "Palmier", "Kokonat", "Pate", "Cookies"] };

function toggleBox(id) {
    var content = document.getElementById(id);
    content.style.display = (content.style.display === "block") ? "none" : "block";
}

function renderProducts() {
    let list = products['ht'];
    let html = '';
    list.forEach((p, i) => {
        html += `<div class="product-item"><input type="checkbox" class="prod-check" value="${p}" id="c-${i}"><label for="c-${i}">${p}</label><input type="number" class="prod-qty" value="1" min="1" style="width:50px;"></div>`;
    });
    document.getElementById('aurisme-list').innerHTML = html;
}

function voyeEmailJS(serviceType) {
    let btn = document.getElementById('btn-sup');
    btn.innerText = "Ap voye...";
    btn.disabled = true;

    let selected = "";
    let container = document.getElementById('aurisme-list');
    let checks = container.querySelectorAll('.prod-check');
    let qtys = container.querySelectorAll('.prod-qty');
    
    checks.forEach((c, i) => { 
        if(c.checked) selected += c.value + " (" + qtys[i].value + "), "; 
    });

    const params = {
        nom_kliyan: document.getElementById('super-name').value || "Kliyan",
        sevis_chwazi: serviceType + " - " + document.getElementById('market-select').value,
        message: "Pwodwi: " + selected + "\nLòt: " + document.getElementById('market-others-list').value
    };

    // Ranje Service ID a
    emailjs.send("Aurisme-Saveurs", "template_lahimq8", params)
        .then(function() {
            alert("Mèsi! Aurisme Saveurs resevwa kòmand ou an.");
            btn.innerText = "KOMANDE KOUNYA";
            btn.disabled = false;
        }, function(err) {
            alert("Erè: " + err.text);
            btn.innerText = "KOMANDE KOUNYA";
            btn.disabled = false;
        });
}

window.onload = function() { renderProducts(); };
</script>
</body>
</html>
