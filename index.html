<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurisme Saveurs et Services</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
:root{--bordeaux:#800000;--gold:#DAA520;--navy:#003366;--green:#28a745;}
body{font-family:'Segoe UI',Tahoma,sans-serif;margin:0;padding:0;background:#f8f8f8;text-align:center;}

/* BADGE SEKIRITE NAN TÈT */
.security-header {background:var(--navy); color:white; padding:5px; font-size:12px; font-weight:bold; display:flex; justify-content:center; align-items:center; gap:8px;}
.security-header i {color: #4CAF50;}

.lang-bar-fixed{position:sticky; top:0; background:white; padding:10px 0; display:flex; justify-content:center; z-index:9999; box-shadow:0 2px 5px rgba(0,0,0,0.1);}
.lang-bar-fixed button{margin:0 8px; padding:8px 15px; border:none; border-radius:20px; cursor:pointer; background:#eee; color:var(--navy); font-weight:bold; font-size:14px; transition:0.3s;}
.lang-bar-fixed button:hover{background:var(--gold); color:white;}

.reklam-ticker{background:var(--gold); color:var(--bordeaux); font-weight:bold; padding:12px 0; overflow:hidden; white-space:nowrap; border-bottom:2px solid var(--bordeaux);}
.reklam-ticker p{display:inline-block; padding-left:100%; animation:ticker 20s linear infinite; margin:0; font-size:16px; text-transform:uppercase;}
@keyframes ticker{0%{transform:translate(0,0);}100%{transform:translate(-100%,0);}}

header{background:var(--bordeaux); color:white; padding:30px 20px; border-bottom:4px solid var(--gold);}
.logo-container img{width:100px; height:100px; border-radius:50%; border:3px solid var(--gold); background:white; object-fit:cover;}

.menu-grid{display:grid; grid-template-columns:1fr 1fr; gap:15px; margin:20px;}
.menu-card{background:white; padding:25px 10px; border-radius:20px; text-align:center; text-decoration:none; color:var(--navy); font-weight:bold; box-shadow:0 10px 20px rgba(0,0,0,0.1); border-bottom:4px solid var(--gold); display:flex; flex-direction:column; align-items:center;}
.menu-card i{font-size:35px; color:var(--bordeaux); margin-bottom:10px;}

.collapsible-box{background:white; border-radius:20px; box-shadow:0 6px 15px rgba(0,0,0,0.1); margin:20px 10px; overflow:hidden; border-left:5px solid var(--bordeaux);}
.collapsible-btn{background:white; width:100%; padding:20px; border:none; text-align:left; font-size:16px; font-weight:bold; color:var(--navy); cursor:pointer; display:flex; justify-content:space-between; align-items:center;}
.collapsible-content{display:none; padding:0 20px 20px 20px; text-align:left;}

input, textarea{width:100%; padding:12px; margin:10px 0; border:1px solid #ddd; border-radius:10px; box-sizing:border-box;}
.btn-order{background-color:var(--bordeaux); color:white; border:none; padding:16px; width:100%; border-radius:10px; font-size:16px; font-weight:bold; cursor:pointer;}

.footer-info{background:#eee; padding:25px; border-radius:20px; margin-top:30px; font-size:13px;}
</style>
</head>
<body>

<div class="security-header">
    <i class="fas fa-shield-alt"></i> <span id="sec-text">Verified Service & Secured Delivery</span>
</div>

<div class="lang-bar-fixed">
    <button onclick="changeLanguage('fr')">FR</button>
    <button onclick="changeLanguage('en')">EN</button>
    <button onclick="changeLanguage('ht')">HT</button>
</div>

<div class="reklam-ticker">
    <p id="ad-text">🌟 VETIHKAM LE BON PARFUM VÉTIVER — DISPONIBLE MAINTENANT ! 🌟</p>
</div>

<header>
    <div class="logo-container"><img src="Logo.png" alt="Logo Aurisme"></div>
    <h1 id="main-title">Aurisme Saveurs et Services</h1>
</header>

<div class="container">
    <div class="menu-grid">
        <a href="livrezon.html" class="menu-card"><i class="fas fa-truck"></i><span id="m-liv">LIVRAISON</span></a>
        <a href="taxi.html" class="menu-card"><i class="fas fa-motorcycle"></i><span id="m-tax">TAXI MOTO</span></a>
        <a href="academy.html" class="menu-card"><i class="fas fa-graduation-cap"></i><span id="m-aca">ACADEMY</span></a>
        <a href="patisserie.html" class="menu-card"><i class="fas fa-birthday-cake"></i><span id="m-pat">PÂTISSERIE</span></a>
        <a href="decoration.html" class="menu-card"><i class="fas fa-utensils"></i><span id="m-dec">DÉCO & TRAITEUR</span></a>
        <a href="galeri.html" class="menu-card"><i class="fas fa-images"></i><span id="m-gal">GALERIE</span></a>
    </div>

    <div class="collapsible-box">
        <button class="collapsible-btn" onclick="toggleBox('box1')"><span id="t-sup">🛒 Service Supermarché</span> <i class="fas fa-chevron-down"></i></button>
        <div id="box1" class="collapsible-content">
            <textarea id="ph1" placeholder="Liste des produits..."></textarea>
            <button class="btn-order" id="btn1" onclick="window.open('https://wa.me/50942017744')">COMMANDER WHATSAPP</button>
        </div>
    </div>

    <div class="collapsible-box" style="border-left-color: var(--gold);">
        <button class="collapsible-btn" onclick="toggleBox('box2')"><span id="t-tour">🌍 Tourist Assistance</span> <i class="fas fa-chevron-down"></i></button>
        <div id="box2" class="collapsible-content">
            <input type="text" id="ph-name" placeholder="Nom Complet / Full Name">
            <textarea id="ph-help" placeholder="Besoin d'aide?"></textarea>
            <button class="btn-order" style="background:var(--gold);" id="btn2" onclick="window.open('https://wa.me/50942017744')">DEMANDER DE L'AIDE</button>
        </div>
    </div>
</div>

<div class="footer-info">
    <p>📧 gâteaux.friandise@gmail.com | 📞 +509 4201-7744</p>
    <iframe src="https://www.google.com/maps/embed?pb=" width="100%" height="200" style="border:0; border-radius:20px;"></iframe>
    <br><br>
    <a href="privacy.html" id="priv-link" style="color:var(--navy); font-weight:bold; text-decoration:none;">🔒 Privacy Policy / Confidentialité</a>
</div>

<script>
function toggleBox(id) {
    var content = document.getElementById(id);
    content.style.display = (content.style.display === "block") ? "none" : "block";
}

const translations = {
    fr: {
        sec: "Service Vérifié & Livraison Sécurisée",
        ad: "🌟 VETIHKAM LE BON PARFUM VÉTIVER — DISPONIBLE MAINTENANT ! 🌟",
        title: "Aurisme Saveurs et Services",
        sup: "🛒 Service Supermarché", tour: "🌍 Tourist Assistance",
        l: "LIVRAISON", t: "TAXI MOTO", a: "ACADEMY", p: "PÂTISSERIE", d: "DÉCO & TRAITEUR", g: "GALERIE",
        b1: "COMMANDER WHATSAPP", b2: "DEMANDER DE L'AIDE",
        ph1: "Liste des produits...", ph_n: "Nom Complet", ph_h: "Comment pouvons-nous vous aider?"
    },
    en: {
        sec: "Verified Service & Secured Delivery",
        ad: "🌟 VETIHKAM THE BEST VETIVER PERFUME — AVAILABLE NOW! 🌟",
        title: "Aurisme Flavors and Services",
        sup: "🛒 Supermarket Service", tour: "🌍 Tourist Assistance",
        l: "DELIVERY", t: "MOTO TAXI", a: "ACADEMY", p: "BAKERY", d: "DECO & CATERING", g: "GALLERY",
        b1: "ORDER VIA WHATSAPP", b2: "REQUEST ASSISTANCE",
        ph1: "Product list...", ph_n: "Full Name", ph_h: "How can we help you?"
    },
    ht: {
        sec: "Sèvis Verifye ak Livrezon an Sekirite",
        ad: "🌟 VETIHKAM BON PARFEN VETIVÈ — LI DISPONIB KOUNYA! 🌟",
        title: "Aurisme Saveurs ak Sèvis",
        sup: "🛒 Sèvis Sipèmache", tour: "🌍 Asistans Touris",
        l: "LIVREZON", t: "TAKSI MOTO", a: "AKADEMI", p: "PATISERI", d: "DEKO & TRAITEUR", g: "GALERI",
        b1: "KOMANDE SOU WHATSAPP", b2: "MANDE ED",
        ph1: "Lis pwodwi yo...", ph_n: "Non konplè", ph_h: "Kijan nou ka ede w?"
    }
};

function changeLanguage(lang) {
    const t = translations[lang];
    document.getElementById('sec-text').innerText = t.sec;
    document.getElementById('ad-text').innerText = t.ad;
    document.getElementById('main-title').innerText = t.title;
    document.getElementById('t-sup').innerText = t.sup;
    document.getElementById('t-tour').innerText = t.tour;
    document.getElementById('m-liv').innerText = t.l;
    document.getElementById('m-tax').innerText = t.t;
    document.getElementById('m-aca').innerText = t.a;
    document.getElementById('m-pat').innerText = t.p;
    document.getElementById('m-dec').innerText = t.d;
    document.getElementById('m-gal').innerText = t.g;
    document.getElementById('btn1').innerText = t.b1;
    document.getElementById('btn2').innerText = t.b2;
    document.getElementById('ph1').placeholder = t.ph1;
    document.getElementById('ph-name').placeholder = t.ph_n;
    document.getElementById('ph-help').placeholder = t.ph_h;
    localStorage.setItem('lang', lang);
}

window.onload = function() {
    changeLanguage(localStorage.getItem('lang') || 'fr');
};
</script>
</body>
</html>
