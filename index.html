<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurisme Saveurs et Services</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
:root{--bordeaux:#800000;--gold:#DAA520;--navy:#003366;}
body{font-family:'Segoe UI',Tahoma,sans-serif;margin:0;padding:0;background:#f8f8f8;text-align:center;}
.reklam-ticker{background:var(--gold);color:var(--bordeaux);font-weight:bold;padding:10px 0;overflow:hidden;white-space:nowrap;border-bottom:2px solid var(--bordeaux);}
.reklam-ticker p{display:inline-block;padding-left:100%;animation:ticker 20s linear infinite;margin:0;font-size:16px;text-transform:uppercase;}
@keyframes ticker{0%{transform:translate(0,0);}100%{transform:translate(-100%,0);}}
header{background:var(--bordeaux);color:white;padding:30px 20px 60px 20px;border-bottom:4px solid var(--gold);}
.logo-container img{width:100px;height:100px;border-radius:50%;border:3px solid var(--gold);background:white;margin-bottom:10px;object-fit:cover;}
.celebrity-bar{background:white;padding:15px 0;display:flex;justify-content:center;gap:15px;border-bottom:1px solid #ddd;}
.celeb-item{text-align:center;min-width:80px;}
.celeb-item img{width:60px;height:60px;border-radius:50%;border:3px solid var(--gold);padding:2px;object-fit:cover;}
.celeb-item p{font-size:11px;margin:5px 0 0;font-weight:bold;color:var(--bordeaux);}
.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin:20px;}
.menu-card{background:white;padding:25px 10px;border-radius:20px;text-align:center;text-decoration:none;color:var(--navy);font-weight:bold;box-shadow:0 10px 20px rgba(0,0,0,0.1);border-bottom:4px solid var(--gold);display:flex;flex-direction:column;align-items:center;}
.menu-card i{font-size:35px;color:var(--bordeaux);margin-bottom:10px;}
.collapsible-box{background:white;border-radius:20px;box-shadow:0 6px 15px rgba(0,0,0,0.1);margin:20px 10px;overflow:hidden;border-left:5px solid var(--bordeaux);}
.collapsible-btn{background:white;width:100%;padding:20px;border:none;text-align:left;font-size:16px;font-weight:bold;color:var(--navy);cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
.collapsible-content{display:none;padding:0 20px 20px 20px;text-align:left;}
input,select,textarea{width:100%;padding:12px;margin:10px 0;border:1px solid #ddd;border-radius:10px;box-sizing:border-box;font-family:inherit;}
.btn-order{background-color:var(--bordeaux);color:white;border:none;padding:16px;width:100%;border-radius:10px;font-size:16px;font-weight:bold;cursor:pointer;margin-top:10px;}
.scroll-list{border:1px solid #ddd;border-radius:10px;padding:10px;max-height:150px;overflow-y:auto;margin:10px 0;background:#fff;}
.scroll-list label{display:block;padding:8px 0;font-size:14px;border-bottom:1px solid #eee;cursor:pointer;}
.footer-info{background:#eee;padding:25px;border-radius:20px;margin-top:30px;font-size:13px;color:#444;}
.social-mini{margin:15px 0;display:flex;justify-content:center;gap:20px;}
.social-mini a{color:var(--bordeaux);font-size:24px;text-decoration:none;}
.lang-bar-fixed{position:fixed;top:0;left:0;width:100%;background:var(--navy);padding:5px 0;display:flex;justify-content:center;z-index:9999;box-shadow:0 4px 6px rgba(0,0,0,0.2);flex-wrap:wrap;}
.lang-bar-fixed button{margin:3px 4px;padding:4px 8px;border:none;border-radius:6px;cursor:pointer;background:var(--gold);color:var(--bordeaux);font-weight:bold;font-size:12px;transition:0.2s;}
</style>
</head>
<body>

<div class="lang-bar-fixed">
<button onclick="changeLanguage('fr')">🇫🇷 FR</button>
<button onclick="changeLanguage('en')">🇺🇸 EN</button>
<button onclick="changeLanguage('es')">🇪🇸 ES</button>
<button onclick="changeLanguage('pt')">🇵🇹 PT</button>
<button onclick="changeLanguage('it')">🇮🇹 IT</button>
<button onclick="changeLanguage('ht')">🇭🇹 HT</button>
</div>

<div class="reklam-ticker"><p id="ad-text">🌟 VETIHKAM LE BON PARFUM VÉTIVER — DISPONIBLE MAINTENANT ! 🌟</p></div>

<header>
<div class="logo-container"><img src="Logo.png" alt="Logo Aurisme"></div>
<h1 id="main-title">Aurisme Saveurs et Services</h1>
</header>

<div class="container">
<div class="menu-grid">
<a href="livrezon.html" class="menu-card"><i class="fas fa-truck"></i><span id="menu-livraison">LIVRAISON</span></a>
<a href="taxi.html" class="menu-card"><i class="fas fa-motorcycle"></i><span id="menu-taxi">TAXI MOTO</span></a>
<a href="academy.html" class="menu-card"><i class="fas fa-graduation-cap"></i><span id="menu-academy">ACADEMY</span></a>
<a href="patisserie.html" class="menu-card"><i class="fas fa-birthday-cake"></i><span id="menu-patisserie">PÂTISSERIE</span></a>
<a href="decoration.html" class="menu-card"><i class="fas fa-utensils"></i><span id="menu-decoration">DÉCO & TRAITEUR</span></a>
<a href="galeri.html" class="menu-card"><i class="fas fa-images"></i><span id="menu-galeri">GALERIE</span></a>
</div>

<div class="collapsible-box">
<button class="collapsible-btn" onclick="toggleBox('market-content')">
<span id="super-title">🛒 Service Supermarché</span> <i class="fas fa-chevron-down"></i>
</button>
<div id="market-content" class="collapsible-content">
<select id="market-name">
<option>Star Market</option><option>Bonjan Market</option>
</select>
<div class="scroll-list" id="super-list">
<label><input type="checkbox" value="Sable"> Sable</label>
<label><input type="checkbox" value="Cookies"> Cookies</label>
</div>
<input type="date" id="market-date">
<textarea id="market-details" placeholder="Détails..."></textarea>
<button class="btn-order" onclick="sendOrder()">WHATSAPP</button>
</div>
</div>

<div class="collapsible-box" style="border-left-color: var(--navy);">
<button class="collapsible-btn" onclick="toggleBox('reseller-content')" style="color: var(--navy);">
<span id="reseller-title">🏪 Espace Ti Machann</span> <i class="fas fa-chevron-down"></i>
</button>
<div id="reseller-content" class="collapsible-content">
<input type="text" id="resell-qty" placeholder="Kantite...">
<button class="btn-order" style="background: var(--navy);" onclick="sendResellOrder()">WHATSAPP</button>
</div>
</div>

</div>

<script>
// 1. FIX POU BWAT YO LOUVRI
function toggleBox(id) {
    var content = document.getElementById(id);
    // Tcheke si l kache oswa l pa gen style ditou
    if (content.style.display === "none" || content.style.display === "") {
        content.style.display = "block";
    } else {
        content.style.display = "none";
    }
}

// 2. FIX POU LANG YO CHANJE
const langData = {
    fr: { title: "Aurisme Saveurs et Services", market: "🛒 Service Supermarché", resell: "🏪 Espace Ti Machann", delivery: "LIVRAISON" },
    ht: { title: "Aurisme Saveurs ak Sèvis", market: "🛒 Sèvis Sipèmache", resell: "🏪 Espas Ti Machann", delivery: "LIVREZON" },
    en: { title: "Aurisme Flavors and Services", market: "🛒 Supermarket Service", resell: "🏪 Resellers Space", delivery: "DELIVERY" },
    es: { title: "Aurisme Sabores y Servicios", market: "🛒 Servicio Supermercado", resell: "🏪 Espacio Revendedores", delivery: "ENTREGA" },
    it: { title: "Aurisme Sapori e Servizi", market: "🛒 Servizio Supermercato", resell: "🏪 Spazio Rivenditori", delivery: "CONSEGNA" },
    pt: { title: "Aurisme Sabores e Serviços", market: "🛒 Serviço Supermercado", resell: "🏪 Espaço Revendedor", delivery: "ENTREGA" }
};

function changeLanguage(lang) {
    const data = langData[lang];
    if (data) {
        document.getElementById('main-title').innerText = data.title;
        document.getElementById('super-title').innerText = data.market;
        document.getElementById('reseller-title').innerText = data.resell;
        document.getElementById('menu-livraison').innerText = data.delivery;
        console.log("Langue changée en: " + lang); // Pou tcheke nan konsòl la
    }
}

// 3. WHATSAPP
function sendOrder(){
    const market = document.getElementById('market-name').value;
    const msg = `*COMMANDE SUPERMARCHÉ*%0A📍 Lieu: ${market}`;
    window.open(`https://wa.me/50942017744?text=${msg}`);
}
</script>
</body>
  </html>
