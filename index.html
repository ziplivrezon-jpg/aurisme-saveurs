<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurisme Saveurs et Services</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
:root{--bordeaux:#800000;--gold:#DAA520;--navy:#003366;}
body{font-family:'Segoe UI',Tahoma,sans-serif;margin:0;padding:0;background:#f8f8f8;text-align:center;}
.reklam-ticker{background:var(--gold);color:var(--bordeaux);font-weight:bold;padding:10px 0;overflow:hidden;white-space:nowrap;border-bottom:2px solid var(--bordeaux);}
.reklam-ticker p{display:inline-block;padding-left:100%;animation:ticker 20s linear infinite;margin:0;font-size:16px;text-transform:uppercase;}
@keyframes ticker{0%{transform:translate(0,0);}100%{transform:translate(-100%,0);}}
header{background:var(--bordeaux);color:white;padding:30px 20px 60px 20px;border-bottom:4px solid var(--gold);}
.logo-container img{width:100px;height:100px;border-radius:50%;border:3px solid var(--gold);background:white;margin-bottom:10px;object-fit:cover;}
.celebrity-bar{background:white;padding:15px 0;display:flex;justify-content:center;gap:15px;border-bottom:1px solid #ddd;}
.celeb-item{text-align:center;min-width:80px;}
.celeb-item img{width:60px;height:60px;border-radius:50%;border:3px solid var(--gold);padding:2px;object-fit:cover;}
.celeb-item p{font-size:11px;margin:5px 0 0;font-weight:bold;color:var(--bordeaux);}
.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin:20px;}
.menu-card{background:white;padding:25px 10px;border-radius:20px;text-align:center;text-decoration:none;color:var(--navy);font-weight:bold;box-shadow:0 10px 20px rgba(0,0,0,0.1);border-bottom:4px solid var(--gold);display:flex;flex-direction:column;align-items:center;transition: 0.3s;}
.menu-card:active{transform: scale(0.95);}
.menu-card i{font-size:35px;color:var(--bordeaux);margin-bottom:10px;}
.collapsible-box{background:white;border-radius:20px;box-shadow:0 6px 15px rgba(0,0,0,0.1);margin:20px 10px;overflow:hidden;border-left:5px solid var(--bordeaux);}
.collapsible-btn{background:white;width:100%;padding:20px;border:none;text-align:left;font-size:16px;font-weight:bold;color:var(--navy);cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
.collapsible-content{display:none;padding:0 20px 20px 20px;text-align:left;}
input,select,textarea{width:100%;padding:12px;margin:10px 0;border:1px solid #ddd;border-radius:10px;box-sizing:border-box;font-family:inherit;}
.btn-order{background-color:var(--bordeaux);color:white;border:none;padding:16px;width:100%;border-radius:10px;font-size:16px;font-weight:bold;cursor:pointer;margin-top:10px;}
.footer-info{background:#eee;padding:25px;border-radius:20px;margin-top:30px;font-size:13px;color:#444;}
.social-mini{margin:15px 0;display:flex;justify-content:center;gap:20px;}
.social-mini a{color:var(--bordeaux);font-size:24px;text-decoration:none;}
.lang-bar-fixed{position:fixed;top:0;left:0;width:100%;background:var(--navy);padding:5px 0;display:flex;justify-content:center;z-index:9999;box-shadow:0 4px 6px rgba(0,0,0,0.2);flex-wrap:wrap;}
.lang-bar-fixed button{margin:3px 4px;padding:4px 8px;border:none;border-radius:6px;cursor:pointer;background:var(--gold);color:var(--bordeaux);font-weight:bold;font-size:12px;}
</style>
</head>
<body>

<div class="lang-bar-fixed">
<button onclick="changeLanguage('fr')">🇫🇷 FR</button>
<button onclick="changeLanguage('en')">🇺🇸 EN</button>
<button onclick="changeLanguage('es')">🇪🇸 ES</button>
<button onclick="changeLanguage('pt')">🇵🇹 PT</button>
<button onclick="changeLanguage('it')">🇮🇹 IT</button>
<button onclick="changeLanguage('ht')">🇭🇹 HT</button>
</div>

<header>
<div class="logo-container"><img src="Logo.png" alt="Logo Aurisme"></div>
<h1 id="main-title">Aurisme Saveurs et Services</h1>
</header>

<div class="container">
<div class="menu-grid">
<a href="livrezon.html" class="menu-card"><i class="fas fa-truck"></i><span id="menu-livraison">LIVRAISON</span></a>
<a href="taxi.html" class="menu-card"><i class="fas fa-motorcycle"></i><span id="menu-taxi">TAXI MOTO</span></a>
<a href="academy.html" class="menu-card"><i class="fas fa-graduation-cap"></i><span id="menu-academy">ACADEMY</span></a>

<a href="decoration.html" class="menu-card"><i class="fas fa-utensils"></i><span id="menu-decoration">DÉCO & TRAITEUR</span></a>

<div class="collapsible-box">
<button class="collapsible-btn" onclick="toggleBox('market-content')"><span id="super-title">🛒 Service Supermarché</span> <i class="fas fa-chevron-down"></i></button>
<div id="market-content" class="collapsible-content">
<select id="market-name">
<option>Star Market</option><option>Bonjan Market</option><option>Juvénat Market</option>
<option>Déli Mart</option>
</select>
<textarea id="market-details" placeholder="Articles..."></textarea>
<button class="btn-order" id="btn-super" onclick="sendOrder()">COMMANDER WHATSAPP</button>

</div>

<div class="collapsible-box" style="border-left-color: var(--navy);">
<button class="collapsible-btn" onclick="toggleBox('reseller-content')" style="color: var(--navy);"><span id="reseller-title">🏪 Espace Ti Machann</span> <i class="fas fa-chevron-down"></i></button>
<div id="reseller-content" class="collapsible-content">

<div class="collapsible-box" style="border-left-color:#DAA520;">

<textarea id="tourist-details" placeholder="How can we help you?"></textarea>
<button class="btn-order" style="background:#DAA520;" id="btn-tourist" onclick="sendTouristOrder()">REQUEST ASSISTANCE</button>
</div>
</div>
</div>

<div class="footer-info">
<p style="font-weight:bold;font-size:16px;">Aurisme Group</p>
<p>📧 gâteaux.friandise@gmail.com | 📞 +509 4201-7744</p>

<div style="margin-top:20px;">
<iframe src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d15143.123456789!2d-72.29!3d18.54!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sfr!2sht!4v123456789" width="100%" height="200" style="border:0;border-radius:20px;" allowfullscreen="" loading="lazy"></iframe>
</div>

<div class="social-mini">
<a href="#"><i class="fab fa-facebook"></i></a>
<a href="#"><i class="fab fa-instagram"></i></a>
<a href="https://wa.me/50942017744"><i class="fab fa-whatsapp"></i></a>
</div>

<div style="margin-top:20px;">
<a href="privacy.html" style="display:inline-block; background:#003366; color:white; padding:10px 20px; border-radius:25px; font-size:14px; text-decoration:none;">
🔒 Privacy Policy / Confidentialité
</a>
</div>
</div>

<script>
// 1. FONKSYON POU BWAT YO OUVRI (GARANTI)
function toggleBox(id) {
    var content = document.getElementById(id);
    var allBoxes = document.querySelectorAll('.collapsible-content');
    
    // Si bwat la te deja louvri, nou fèmen li
    if (content.style.display === "block") {
        content.style.display = "none";
    } else {
        // Fèmen tout rès yo anvan epi ouvri sa a
        allBoxes.forEach(box => box.style.display = "none");
        content.style.display = "block";
    }
}

// 2. SISTÈM TRADIKSYON POU TOUT LANG YO
const translations = {
    fr: { title: "Aurisme Saveurs et Services", market: "🛒 Service Supermarché", resell: "🏪 Espace Ti Machann", tourist: "🌍 Tourist Assistance", deliv: "LIVRAISON", taxi: "TAXI MOTO", btn: "COMMANDER WHATSAPP" },
    ht: { title: "Aurisme Saveurs ak Sèvis", market: "🛒 Sèvis Sipèmache", resell: "🏪 Espas Ti Machann", tourist: "🌍 Asistans Touris", deliv: "LIVREZON", taxi: "TAKSI MOTO", btn: "KOMANDE SOU WHATSAPP" },
    en: { title: "Aurisme Flavors and Services", market: "🛒 Supermarket Service", resell: "🏪 Resellers Space", tourist: "🌍 Tourist Assistance", deliv: "DELIVERY", taxi: "MOTO TAXI", btn: "ORDER VIA WHATSAPP" },
    es: { title: "Aurisme Sabores y Servicios", market: "🛒 Servicio Supermercado", resell: "🏪 Espacio Revendedores", tourist: "🌍 Asistencia Turística", deliv: "ENTREGA", taxi: "TAXI MOTO", btn: "PEDIR POR WHATSAPP" },
    it: { title: "Aurisme Sapori e Servizi", market: "🛒 Servizio Supermercato", resell: "🏪 Spazio Rivenditori", tourist: "🌍 Assistenza Turistica", deliv: "CONSEGNA", taxi: "TAXI MOTO", btn: "ORDINA SU WHATSAPP" },
    pt: { title: "Aurisme Sabores e Serviços", market: "🛒 Serviço Supermercado", resell: "🏪 Espaço Revendedor", tourist: "🌍 Assistência Turística", deliv: "ENTREGA", taxi: "TAXI MOTO", btn: "PEDIR NO WHATSAPP" }
};

function changeLanguage(lang) {
    const t = translations[lang];
    if(!t) return;

    // Chanje Tit ak Menu
    document.getElementById('main-title').innerText = t.title;
    document.getElementById('super-title').innerText = t.market;
    document.getElementById('reseller-title').innerText = t.resell;
    document.getElementById('tourist-title').innerText = t.tourist;
    document.getElementById('menu-livraison').innerText = t.deliv;
    document.getElementById('menu-taxi').innerText = t.taxi;
    
    // Chanje bouton yo
    document.getElementById('btn-super').innerText = t.btn;
    document.getElementById('btn-resell').innerText = t.btn;
    
    // SOVE LANG LAN NAN TELEFÒN NAN
    localStorage.setItem('selectedLang', lang);
}

// Lè moun nan tounen sou paj la, remete lang li te chwazi a
window.onload = function() {
    const savedLang = localStorage.getItem('selectedLang') || 'fr';
    changeLanguage(savedLang);
};

// 3. WHATSAPP ORDERS
function sendOrder(){
    const market = document.getElementById('market-name').value;
    const details = document.getElementById('market-details').value;
    window.open(`https://wa.me/50942017744?text=*SUPERMARCHÉ*%0A📍:${market}%0A📝:${details}`);
}
function sendTouristOrder(){
    const name = document.getElementById('tourist-name').value;
    window.open(`https://wa.me/50942017744?text=*TOURIST HELP*%0A👤:${name}`);
}
</script>
</body>
</html>
