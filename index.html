<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurisme Saveurs et Services</title>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
      (function(){
          // Public Key ou a
          emailjs.init("-QYhlIQKH8q-aZkZa");
      })();
    </script>

    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; margin: 0; padding: 20px; background-color: #f4f4f4; }
        .container { max-width: 600px; margin: auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { color: #333; text-align: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #218838; }
    </style>
</head>
<body>

<div class="container">
    <h2>Fè yon Kòmand - Aurisme Saveurs</h2>
    
    <form id="komand-form">
        <div class="form-group">
            <label for="nom_kliyan">Non ou:</label>
            <input type="text" id="nom_kliyan" name="nom_kliyan" placeholder="Ekri non ou" required>
        </div>

        <div class="form-group">
            <label for="telefon">Telefòn:</label>
            <input type="tel" id="telefon" name="telefon" placeholder="Nimewo telefòn ou" required>
        </div>

        <div class="form-group">
            <label for="sevis_chwazi">Sèvis ou bezwen:</label>
            <select id="sevis_chwazi" name="sevis_chwazi">
                <option value="Livrezon Express">Livrezon Express</option>
                <option value="Patisri Artisanale">Patisri Artisanale</option>
                <option value="Taxi Service">Taxi Service</option>
                <option value="Sol Prestige">Sol Prestige (Savings)</option>
                <option value="Dekorasyon">Dekorasyon</option>
            </select>
        </div>

        <div class="form-group">
            <label for="message">Detay kòmand lan:</label>
            <textarea id="message" name="message" rows="4" placeholder="Kisa ou bezwen egzakteman? (Adrès, kantite, elatriye)" required></textarea>
        </div>

        <button type="submit" id="btn-voye">Voye Kòmand</button>
    </form>
</div>

<script type="text/javascript">
  const btn = document.getElementById('btn-voye');

  document.getElementById('komand-form').addEventListener('submit', function(event) {
    event.preventDefault();

    btn.textContent = 'Ap voye...';
    btn.disabled = true;

    const serviceID = 'Aurisme-Saveurs';
    const templateID = 'template_lahimq8';

    // Voye done yo bay EmailJS
    emailjs.sendForm(serviceID, templateID, this)
      .then(() => {
        btn.textContent = 'Voye Kòmand';
        btn.disabled = false;
        alert('Mèsi! Aurisme Saveurs resevwa kòmand ou an, n ap kontakte w talè.');
        this.reset();
      }, (err) => {
        btn.textContent = 'Voye Kòmand';
        btn.disabled = false;
        alert("Gen yon pwoblèm: " + JSON.stringify(err));
      });
  });
</script>

</body>
</html>
