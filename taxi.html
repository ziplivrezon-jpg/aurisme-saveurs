<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taxi Moto & Navette - Aurisme</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
      (function(){
          emailjs.init("-QYhlIQKH8q-aZkZa");
      })();
    </script>

    <style>
        :root { --bordeaux: #800000; --gold: #DAA520; --navy: #003366; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: #f4f4f4; text-align: center; color: #333; }
        
        .lang-bar { background: white; padding: 10px; display: flex; justify-content: center; gap: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 1000; }
        .lang-bar button { border: none; background: #eee; padding: 5px 12px; border-radius: 15px; cursor: pointer; font-weight: bold; color: var(--navy); }

        header { background: var(--bordeaux); color: white; padding: 25px; border-bottom: 4px solid var(--gold); position: relative; }
        .btn-back { position: absolute; left: 15px; top: 30px; color: white; text-decoration: none; font-size: 20px; }

        .container { padding: 20px; max-width: 500px; margin: auto; }

        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 25px; text-align: left; border-top: 5px solid var(--gold); }
        .card h2 { text-align: center; color: var(--bordeaux); margin-top: 0; font-size: 20px; }
        
        label { font-weight: bold; font-size: 14px; color: var(--navy); display: block; margin-top: 15px; }
        .input-field, .zone-select { width: 100%; padding: 14px; border-radius: 10px; border: 2px solid #ddd; font-size: 15px; margin-top: 5px; box-sizing: border-box; font-family: inherit; }

        .btn-action { width: 100%; padding: 16px; border-radius: 12px; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: bold; font-size: 16px; margin-top: 15px; border: none; cursor: pointer; transition: 0.3s; }
        .btn-email { background: var(--gold); color: var(--bordeaux); }
        .btn-share { background: #eee; color: #333; border: 1px solid #ccc; }
        .btn-call { background: var(--navy); color: white; margin: 20px auto 0 auto; width: 90%; } 
        .btn-navette { background: var(--bordeaux); color: white; }

        .safety-box { background: #fffde7; border: 1px solid var(--gold); padding: 15px; border-radius: 15px; font-size: 13px; margin-top: 10px; text-align: left; }
        .urgent-badge { background: #ffeded; color: #d32f2f; padding: 5px 10px; border-radius: 5px; font-size: 12px; display: inline-block; margin-bottom: 10px; font-weight: bold; border: 1px solid #d32f2f; }
        .icon-section { font-size: 40px; color: var(--gold); display: block; text-align: center; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="lang-bar">
        <button onclick="changeLang('fr')">FR</button>
        <button onclick="changeLang('en')">EN</button>
        <button onclick="changeLang('ht')">HT</button>
    </div>

    <header>
        <a href="index.html" class="btn-back"><i class="fas fa-arrow-left"></i></a>
        <h1 id="txt-header">Services Transport Aurisme</h1>
    </header>

    <div class="container">
        
        <div class="card">
            <i class="fas fa-motorcycle icon-section"></i>
            <h2 id="txt-moto-title">TAXI MOTO SÉCURISÉ</h2>
            
            <label id="lbl-name-moto">Nom Complet :</label>
            <input type="text" id="moto-client-name" class="input-field" placeholder="Votre nom">

            <label id="lbl-phone-moto">Numéro de Téléphone :</label>
            <input type="tel" id="moto-client-phone" class="input-field" placeholder="Ex: +509 3xxx xxxx">

            <label id="lbl-route">Votre Itinéraire / Zone :</label>
            <select class="zone-select" id="zone-list">
                <option value="Non spécifiée" id="opt-choose">-- Choisir un trajet --</option>
                <optgroup label="Zones Principales">
                    <option value="Péguy-Ville">Péguy-Ville</option>
                    <option value="Pétion-Ville">Pétion-Ville</option>
                    <option value="Laboule / Thomassin">Laboule / Thomassin</option>
                    <option value="Delmas">Delmas</option>
                    <option value="Route de Frères">Route de Frères</option>
                    <option value="Tabarre">Tabarre</option>
                </optgroup>
            </select>

            <label id="lbl-moto-color">Couleur de la Moto :</label>
            <input type="text" id="moto-color" class="input-field" placeholder="Ex: Rouge et Noir">

            <label id="lbl-driver-name">Nom du Chauffeur (si connu) :</label>
            <input type="text" id="moto-driver" class="input-field" placeholder="Nom du chauffeur">

            <label id="lbl-pay-moto">Mode de Paiement :</label>
            <select class="zone-select" id="moto-payment">
                <option value="Natcash">Natcash</option>
                <option value="Moncash">Moncash</option>
                <option value="Cash">Cash</option>
                <option value="Zelle/PayPal">Zelle / PayPal</option>
            </select>

            <button onclick="sendTransportEmail('Moto')" class="btn-action btn-email">
                <i class="fas fa-envelope"></i> <span id="btn-moto">COMMANDER MOTO</span>
            </button>

            <button onclick="shareTrip('Moto')" class="btn-action btn-share">
                <i class="fas fa-user-shield"></i> <span id="btn-share-moto">PARTAGER À MA FANMI</span>
            </button>
        </div>

        <div class="card" style="border-top: 5px solid var(--navy);">
            <i class="fas fa-shuttle-van icon-section" style="color: var(--navy);"></i>
            <h2 id="txt-navette-title">NAVETTE AÉROPORT</h2>
            
            <div class="urgent-badge"><i class="fas fa-bolt"></i> Option Anti-Blokus (Moto) disponible</div>

            <label id="lbl-name-nav">Nom Complet :</label>
            <input type="text" id="nav-client-name" class="input-field" placeholder="Votre nom">

            <label id="lbl-phone-nav">Numéro de Téléphone :</label>
            <input type="tel" id="nav-client-phone" class="input-field" placeholder="Ex: +509 3xxx xxxx">

            <label id="lbl-nav-type">Type de Réservation :</label>
            <select class="zone-select" id="navette-type">
                <option value="Hôtel vers Aéroport" id="opt-h-a">Hôtel ➔ Aéroport</option>
                <option value="Aéroport vers Hôtel" id="opt-a-h">Aéroport ➔ Hôtel</option>
            </select>

            <label id="lbl-vehicle">Véhicule souhaité :</label>
            <select class="zone-select" id="vehicle-type">
                <option value="Machin (Confort)">Machin (Confort + Valises)</option>
                <option value="Moto Express (Anti-Blokus)">Moto Express (Anti-Blokus)</option>
            </select>

            <label id="lbl-hotel">Nom de l'Hôtel & Heure :</label>
            <input type="text" id="hotel-info" class="input-field" placeholder="Ex: Karibe Hôtel / 10:00 AM">

            <button onclick="sendTransportEmail('Navette')" class="btn-action btn-navette">
                <i class="fas fa-envelope"></i> <span id="btn-nav">RÉSERVER LA NAVETTE</span>
            </button>

            <button onclick="shareTrip('Navette')" class="btn-action btn-share">
                <i class="fas fa-user-shield"></i> <span id="btn-share-nav">PARTAGER À MA FANMI</span>
            </button>
        </div>

        <a href="tel:+50942017744" class="btn-action btn-call">
            <i class="fas fa-phone-alt"></i> <span id="btn-call">APPEL DIRECT</span>
        </a>

        <div class="safety-box" id="safety-txt">
            <p><strong><i class="fas fa-lock"></i> SÉCURITÉ AURISME :</strong><br>
            Tous nos chauffeurs sont certifiés. Partagez votre trajet pour votre sécurité.</p>
        </div>
    </div>

    <script>
        const translations = {
            fr: {
                header: "Services Transport Aurisme",
                motoT: "TAXI MOTO SÉCURISÉ", navT: "NAVETTE AÉROPORT",
                btnM: "COMMANDER MOTO", btnN: "RÉSERVER LA NAVETTE",
                btnS: "PARTAGER À MA FAMILLE",
                lName: "Nom Complet :", lPhone: "Numéro de Téléphone :",
                lColor: "Couleur de la Moto :", lDriver: "Nom du Chauffeur :",
                success: "Demande envoyée avec succès !",
                shareMsgM: "Je suis en route avec Aurisme Taxi Moto vers: ",
                shareMsgN: "Je prends une Navette Aurisme (Aéroport). Type: "
            },
            en: {
                header: "Aurisme Transport Services",
                motoT: "SECURE MOTO TAXI", navT: "AIRPORT SHUTTLE",
                btnM: "ORDER MOTO", btnN: "BOOK SHUTTLE",
                btnS: "SHARE WITH FAMILY",
                lName: "Full Name:", lPhone: "Phone Number:",
                lColor: "Moto Color:", lDriver: "Driver Name:",
                success: "Request sent successfully!",
                shareMsgM: "I am on my way with Aurisme Taxi Moto to: ",
                shareMsgN: "I am taking an Aurisme Shuttle (Airport). Type: "
            },
            ht: {
                header: "Sèvis Transpò Aurisme",
                motoT: "TAKSI MOTO AN SEKIRITE", navT: "NAVÈT EYÈPÒT",
                btnM: "KOMANDE MOTO", btnN: "REZÈVE NAVÈT LA",
                btnS: "PATAJE AK FANMI M",
                lName: "Non Konplè :", lPhone: "Nimewo Telefòn :",
                lColor: "Koulè Moto a :", lDriver: "Non Chofè a :",
                success: "Demand lan voye byen pwòp!",
                shareMsgM: "Mwen nan wout ak Aurisme Taxi Moto pou m ale: ",
                shareMsgN: "Mwen pran yon Navèt Aurisme (Eyèpòt). Tip: "
            }
        };

        function changeLang(lang) {
            const t = translations[lang];
            document.getElementById('txt-header').innerText = t.header;
            document.getElementById('txt-moto-title').innerText = t.motoT;
            document.getElementById('txt-navette-title').innerText = t.navT;
            document.getElementById('btn-moto').innerText = t.btnM;
            document.getElementById('btn-nav').innerText = t.btnN;
            document.getElementById('btn-share-moto').innerText = t.btnS;
            document.getElementById('btn-share-nav').innerText = t.btnS;
            
            document.getElementById('lbl-name-moto').innerText = t.lName;
            document.getElementById('lbl-name-nav').innerText = t.lName;
            document.getElementById('lbl-phone-moto').innerText = t.lPhone;
            document.getElementById('lbl-phone-nav').innerText = t.lPhone;
            document.getElementById('lbl-moto-color').innerText = t.lColor;
            document.getElementById('lbl-driver-name').innerText = t.lDriver;

            localStorage.setItem('aurisme_moto_lang', lang);
        }

        function sendTransportEmail(type) {
            let params = {};
            let lang = localStorage.getItem('aurisme_moto_lang') || 'fr';

            if(type === 'Moto') {
                const name = document.getElementById('moto-client-name').value;
                const phone = document.getElementById('moto-client-phone').value;
                const zone = document.getElementById('zone-list').value;
                const color = document.getElementById('moto-color').value;
                const driver = document.getElementById('moto-driver').value;
                const pay = document.getElementById('moto-payment').value;

                if(!name || !phone || zone === "Non spécifiée") { 
                    alert(lang === 'ht' ? "Ranpli Non, Telefòn ak Zòn nan souple" : "SVP remplissez le Nom, Téléphone et la Zone"); 
                    return; 
                }
                
                params = {
                    nom_kliyan: name,
                    sevis_chwazi: "Taxi Moto Aurisme",
                    message: `📞 Tel: ${phone}\n📍 Zone: ${zone}\n🎨 Couleur: ${color}\n👤 Chauffeur: ${driver}\n💳 Paiement: ${pay}`
                };
            } else {
                const name = document.getElementById('nav-client-name').value;
                const phone = document.getElementById('nav-client-phone').value;
                const navType = document.getElementById('navette-type').value;
                const vehicle = document.getElementById('vehicle-type').value;
                const hotel = document.getElementById('hotel-info').value;

                if(!name || !phone || !hotel) { 
                    alert(lang === 'ht' ? "Tanpri ranpli tout bwat yo" : "SVP remplissez tous les champs"); 
                    return; 
                }

                params = {
                    nom_kliyan: name,
                    sevis_chwazi: "Navette Aéroport Aurisme",
                    message: `📞 Tel: ${phone}\n🚐 Type: ${navType}\n🚗 Véhicule: ${vehicle}\n🏨 Détails: ${hotel}`
                };
            }

            emailjs.send("Aurisme-Saveurs", "template_lahimq8", params)
                .then(() => {
                    alert(translations[lang].success);
                    // Reset bwat yo apre l fin voye
                    if(type === 'Moto'){
                        document.getElementById('moto-color').value = "";
                        document.getElementById('moto-driver').value = "";
                    } else {
                        document.getElementById('hotel-info').value = "";
                    }
                }, (err) => {
                    alert("Erreur: " + JSON.stringify(err));
                });
        }

        function shareTrip(type) {
            var lang = localStorage.getItem('aurisme_moto_lang') || 'fr';
            var textMsg = "";
            if(type === 'Moto') {
                textMsg = translations[lang].shareMsgM + document.getElementById('zone-list').value;
            } else {
                textMsg = translations[lang].shareMsgN + document.getElementById('navette-type').value + " (" + document.getElementById('vehicle-type').value + ")";
            }
            if (navigator.share) {
                navigator.share({ title: 'Aurisme Safety', text: textMsg }).catch(console.error);
            } else {
                window.open("https://wa.me/?text=" + encodeURIComponent(textMsg));
            }
        }

        window.onload = function() {
            changeLang(localStorage.getItem('aurisme_moto_lang') || 'fr');
        };
    </script>
</body>
</html>
