<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Aurisme Saveurs et Services</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root { --bordeaux: #800000; --gold: #DAA520; --navy: #003366; --green: #27ae60; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: #f4f4f4; overflow: hidden; }
        
        .sidebar { width: 350px; background: white; padding: 20px; box-shadow: 2px 0 10px rgba(0,0,0,0.1); z-index: 10; overflow-y: auto; height: 100vh; }
        
        .brand-container { text-align: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid var(--gold); }
        .admin-logo { width: 85px; height: auto; max-height: 85px; margin-bottom: 10px; }
        .brand-name { color: var(--bordeaux); font-size: 15px; font-weight: bold; text-transform: uppercase; margin: 0; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-card { background: #f9f9f9; padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #eee; }
        .stat-card b { font-size: 15px; color: var(--bordeaux); }

        h3 { font-size: 13px; color: var(--navy); margin-top: 20px; border-left: 3px solid var(--gold); padding-left: 10px; text-transform: uppercase; }
        
        /* New Order List Styles */
        .order-box { background: #fff5f5; border: 1px solid #ffcccc; padding: 10px; border-radius: 8px; margin-bottom: 10px; font-size: 12px; border-left: 4px solid var(--bordeaux); }
        .btn-wa-admin { background: #25D366; color: white; border: none; padding: 5px 10px; border-radius: 5px; font-size: 11px; cursor: pointer; text-decoration: none; display: inline-block; margin-top: 5px; }
        .btn-del { background: #eee; color: #888; border: none; padding: 5px; border-radius: 5px; float: right; cursor: pointer; }

        input, select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 13px; margin-bottom: 8px; }
        .btn-update { width: 100%; background: var(--navy); color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-download { width: 100%; background: #e74c3c; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        
        #adminMap { flex: 1; height: 100%; }
        .badge { padding: 2px 6px; border-radius: 10px; font-size: 9px; font-weight: bold; color: white; background: var(--navy); }
    </style>
</head>
<body>

    <audio id="notifSound" src="notification.mp3"></audio>

    <div class="sidebar">
        <div class="brand-container">
            <img src="Logo.png" alt="Logo" class="admin-logo">
            <h1 class="brand-name">Aurisme Admin</h1>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card"><span>Saveurs</span><b id="stat-commande">0</b></div>
            <div class="stat-card"><span>Services</span><b id="stat-livraison">0</b></div>
        </div>

        <h3 style="background: #fff0f0;"><i class="fas fa-bell"></i> Kòmand ki tonbe (App)</h3>
        <div id="live-orders-container" style="max-height: 300px; overflow-y: auto; padding-right: 5px;">
            <p style="font-size: 11px; color: #999; text-align: center;">N ap tann kòmand...</p>
        </div>

        <hr>

        <h3><i class="fas fa-truck"></i> Suivi Tracking</h3>
        <input type="text" id="orderID" placeholder="ID (ex: AUR-101)">
        <select id="orderStatus">
            <option value="📦 Préparation">📦 Préparation</option>
            <option value="🛵 En route">🛵 En route</option>
            <option value="✅ Livré">✅ Livré</option>
        </select>
        <button class="btn-update" onclick="updateTracking()">Mete ajou Tracking</button>
        
        <hr>

        <h3><i class="fas fa-file-pdf"></i> Rapò & Achiv</h3>
        <button class="btn-download" onclick="downloadPDF()"><i class="fas fa-file-pdf"></i> Rapò PDF</button>
        
        <div class="link-box" style="margin-top: 20px; font-size: 11px;">
            <a href="https://tourist.com/p/17401" target="_blank" style="color: var(--bordeaux);">Paj Tourist.com</a>
        </div>
    </div>

    <div id="adminMap"></div>

    <script>
        // CONFIG FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyCjOguIuH9o5VOu05ZKJ_nWPYKlYx-BKcc",
            authDomain: "aurisme-system.firebaseapp.com",
            projectId: "aurisme-system",
            storageBucket: "aurisme-system.firebasestorage.app",
            messagingSenderId: "161670089924",
            appId: "1:161670089924:web:adb80cf04646ac956fcd91"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Audio and Notification
        const notifSound = document.getElementById('notifSound');

        // Listen for NEW Orders from App
        db.collection("komand").orderBy("dat_komand", "desc").onSnapshot(snapshot => {
            const container = document.getElementById('live-orders-container');
            
            // Check for new additions to play sound
            if (!snapshot.metadata.hasPendingWrites && snapshot.docChanges().some(c => c.type === "added")) {
                notifSound.play().catch(e => console.log("Son bloke pa navigatè a"));
            }

            container.innerHTML = "";
            let saveursCount = 0;
            let servicesCount = 0;

            snapshot.forEach(doc => {
                const o = doc.data();
                const id = doc.id;
                
                if(o.service === "Pâtisserie") saveursCount++;
                else servicesCount++;

                const card = document.createElement('div');
                card.className = 'order-box';
                
                let details = o.service === "Livraison" ? o.tip_livrezon : (o.pwodwi || o.kalite_fet);
                
                card.innerHTML = `
                    <button class="btn-del" onclick="deleteOrder('${id}')">&times;</button>
                    <span class="badge">${o.service}</span> <small>${o.dat_komand || ''}</small><br>
                    <b>${details}</b><br>
                    <small>${o.detay || o.mesaj || o.tèm_detay || ''}</small><br>
                    <a href="https://wa.me/50942017744" class="btn-wa-admin" target="_blank">
                        <i class="fab fa-whatsapp"></i> Reponn
                    </a>
                `;
                container.appendChild(card);
            });

            document.getElementById('stat-commande').innerText = saveursCount;
            document.getElementById('stat-livraison').innerText = servicesCount;
        });

        // Delete Order
        async function deleteOrder(id) {
            if(confirm("Supprimer cette commande ?")) {
                await db.collection("komand").doc(id).delete();
            }
        }

        // Update Tracking for Clients
        async function updateTracking() {
            const id = document.getElementById('orderID').value.trim().toUpperCase();
            const status = document.getElementById('orderStatus').value;
            if(!id) return alert("Antre ID a!");
            await db.collection("orders_tracking").doc(id).set({ 
                status: status, 
                lastUpdate: new Date().toLocaleString() 
            }, { merge: true });
            alert("Tracking Mizajou!");
        }

        // Map setup
        const map = L.map('adminMap').setView([18.5392, -72.2854], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        const markers = {};
        const motoIcon = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/713/713422.png', iconSize: [35, 35] });

        db.collection("orders_tracking").onSnapshot(snapshot => {
            snapshot.docChanges().forEach(change => {
                const data = change.doc.data();
                const id = change.doc.id;
                if (data.lat && data.lng) {
                    if (markers[id]) { markers[id].setLatLng([data.lat, data.lng]); }
                    else { markers[id] = L.marker([data.lat, data.lng], {icon: motoIcon}).addTo(map).bindPopup("<b>" + id + "</b>"); }
                }
            });
        });

        // PDF Report (Using current visible orders)
        function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("RAPO KOMAND AURISME", 20, 20);
            // Ou ka ajoute plis detay isit la baze sou allOrders
            doc.save("Aurisme_Rapo.pdf");
        }
    </script>
</body>
</html>
