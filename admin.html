<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Aurisme Saveurs</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { --bordeaux: #800000; --gold: #DAA520; --navy: #003366; }
        body { font-family: sans-serif; margin: 0; display: flex; height: 100vh; background: #f4f4f4; }
        
        /* Sidebar */
        .sidebar { width: 300px; background: white; padding: 20px; box-shadow: 2px 0 10px rgba(0,0,0,0.1); z-index: 10; }
        h2 { color: var(--bordeaux); font-size: 18px; border-bottom: 2px solid var(--gold); padding-bottom: 10px; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 5px; color: var(--navy); }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        
        .btn-update { width: 100%; background: var(--navy); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-update:hover { background: var(--bordeaux); }

        /* Map */
        #adminMap { flex: 1; height: 100%; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2><i class="fas fa-shield-alt"></i> Panel Aurisme</h2>
        
        <div class="form-group">
            <label>ID COMMANDE (ex: AUR-2026)</label>
            <input type="text" id="orderID" placeholder="ID de la commande">
        </div>

        <div class="form-group">
            <label>STATUT DE LIVRAISON</label>
            <select id="orderStatus">
                <option value="📦 Préparation">📦 Préparation</option>
                <option value="🛵 En route">🛵 En route</option>
                <option value="✅ Livré">✅ Livré</option>
                <option value="❌ Annulé">❌ Annulé</option>
            </select>
        </div>

        <div class="form-group">
            <label>NOM DU LIVREUR</label>
            <input type="text" id="courierName" placeholder="Nom du livreur">
        </div>

        <button class="btn-update" onclick="updateOrder()">Mettre à jour / Créer</button>
        
        <hr>
        <div id="activeDrivers">
            <p style="font-size: 12px; color: #666;">Livreurs actifs sur la carte...</p>
        </div>
    </div>

    <div id="adminMap"></div>

    <script>
        // CONFIG FIREBASE (Utilise la même que ta page client)
        const firebaseConfig = { apiKey: "AIza...", projectId: "aurisme-app", appId: "1:..." };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Init Carte
        const map = L.map('adminMap').setView([18.5392, -72.2854], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        const markers = {}; // Pour stocker les marqueurs des livreurs

        // Icône Moto
        const motoIcon = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/713/713422.png',
            iconSize: [35, 35]
        });

        // 1. Fonction pour mettre à jour Firestore
        async function updateOrder() {
            const id = document.getElementById('orderID').value.trim().toUpperCase();
            const status = document.getElementById('orderStatus').value;
            const courier = document.getElementById('courierName').value;

            if(!id) return alert("Entrez un ID !");

            await db.collection("orders_tracking").doc(id).set({
                status: status,
                courier: courier,
                lastUpdate: new Date().toLocaleString()
            }, { merge: true });

            alert("Commande " + id + " mise à jour !");
        }

        // 2. Afficher TOUS les livreurs en temps réel sur la carte admin
        db.collection("orders_tracking").onSnapshot((snapshot) => {
            snapshot.docChanges().forEach((change) => {
                const data = change.doc.data();
                const id = change.doc.id;

                if (data.lat && data.lng) {
                    if (markers[id]) {
                        markers[id].setLatLng([data.lat, data.lng]);
                    } else {
                        markers[id] = L.marker([data.lat, data.lng], {icon: motoIcon})
                                      .addTo(map)
                                      .bindPopup("<b>" + id + "</b><br>" + data.courier);
                    }
                }
            });
        });
    </script>
</body>
    </html>
